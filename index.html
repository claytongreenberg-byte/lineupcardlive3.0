<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" sizes="180x180" href="logos/apple-touch-icon4.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lineup Card">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lineup Card Live | Digital Pressbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --primary-navy:#1f3a5e; --primary-gold:#e6b422; --accent-red:#c41e3a;
      --bg-light:#f4f6fa; --surface-light:#f0f2f5; --text-light:#0f172a; --border-light:#dce3ec;
      --bg-dark:#0f172a; --surface-dark:#1e293b; --text-dark:#f1f5f9; --border-dark:#334155;
      --touch-target:44px; --font-base:17px;
      --team-select-bg:#f8f9fb; --team-select-text:#0f172a; --team-select-border:#1d4ed8;
      --card-shadow:0 8px 20px rgba(0,0,0,0.06);
    }
    body.dark-mode {
      --bg-light:var(--bg-dark); --surface-light:var(--surface-dark); --text-light:var(--text-dark);
      --border-light:var(--border-dark); --team-select-bg:#1e293b; --team-select-text:#f1f5f9; --team-select-border:#3b82f6;
    }
    body {
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--bg-light); color:var(--text-light);
      height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden;
      font-size:var(--font-base); transition:background 0.2s,color 0.2s;
    }
    body::before { content:''; position:fixed; top:0; left:0; width:100%; height:4px; background:var(--accent-red); z-index:2000; }
    header {
      background:var(--primary-navy); color:#fff; padding:6px 14px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:2px solid var(--primary-gold); flex-shrink:0; flex-wrap:nowrap; gap:8px; min-height:64px;
    }
    .brand-section { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .logo-main { height:42px; width:auto; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3)); background:var(--primary-gold); border-radius:6px; padding:3px; }
    .brand-text h1 { font-size:1.2rem; font-weight:800; letter-spacing:-0.3px; line-height:1.1; white-space:nowrap; }
    .brand-text p { font-size:0.65rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--accent-red); line-height:1.1; white-space:nowrap; font-weight:800; }
    .timers-area { display:flex; gap:8px; align-items:center; flex-shrink:0; }
    .timer-pill { background:rgba(0,0,0,0.35); border:2px solid var(--accent-red); border-radius:40px; padding:5px 12px; display:flex; align-items:center; gap:6px; font-size:0.75rem; }
    .timer-label { font-weight:600; color:var(--primary-gold); white-space:nowrap; }
    .timer-value { font-family:monospace; font-weight:700; min-width:35px; }
    .timer-value.red-flash { color:red; animation:flash 0.5s infinite; }
    @keyframes flash { 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }
    .btn-icon { background:rgba(255,255,255,0.2); border:none; color:#fff; padding:6px 10px; border-radius:16px; font-size:0.7rem; cursor:pointer; min-height:var(--touch-target); min-width:var(--touch-target); display:inline-flex; align-items:center; justify-content:center; touch-action:manipulation; transition:transform 60ms ease,opacity 60ms ease; }
    .btn-icon:active { opacity:0.7; transform:scale(0.94); }
    .btn-icon.green { background:#2e7d32; }
    .btn-icon.wx-color { background:#e6a817; color:#000; }
    .reset-pill { background:var(--accent-red); color:#fff; border:none; padding:8px 14px; border-radius:30px; font-weight:800; font-size:0.7rem; cursor:pointer; white-space:nowrap; min-height:var(--touch-target); touch-action:manipulation; font-family:'Inter',sans-serif; transition:transform 60ms ease,opacity 60ms ease; }
    .reset-pill:active { opacity:0.7; transform:scale(0.94); }
    .tool-section { display:flex; gap:6px; align-items:center; flex-shrink:0; }
    .header-btn { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.3); color:#fff; padding:6px 14px; border-radius:16px; font-size:0.7rem; font-weight:600; cursor:pointer; white-space:nowrap; min-height:var(--touch-target); touch-action:manipulation; font-family:'Inter',sans-serif; transition:transform 60ms ease,opacity 60ms ease; }
    .header-btn:active { opacity:0.7; transform:scale(0.94); }
    .theme-toggle { background:rgba(0,0,0,0.4); border-radius:30px; padding:2px; display:flex; }
    .theme-btn { background:none; border:none; padding:5px 12px; border-radius:24px; cursor:pointer; font-size:0.85rem; color:#fff; min-height:var(--touch-target); min-width:var(--touch-target); touch-action:manipulation; transition:transform 60ms ease,opacity 60ms ease; }
    .theme-btn:active { opacity:0.7; transform:scale(0.94); }
    .theme-btn.active { background:var(--primary-gold); color:#0a1c3a; }
    nav { background:#374151; display:flex; padding:0 10px; gap:2px; flex-shrink:0; overflow-x:auto; }
    .nav-link { padding:8px 14px; background:none; border:none; font-weight:700; font-size:0.75rem; text-transform:uppercase; color:#fff; cursor:pointer; white-space:nowrap; border-bottom:3px solid transparent; min-height:var(--touch-target); touch-action:manipulation; transition:transform 60ms ease,opacity 60ms ease; }
    .nav-link:active { opacity:0.7; transform:scale(0.94); }
    .nav-link.active { color:#fff; border-bottom-color:var(--primary-gold); }
    #main-container { flex:1; overflow:hidden; }
    main { height:100%; padding:10px; overflow-y:auto; overflow-x:hidden; }
    .view-pane { display:none; height:100%; }
    .view-pane.active { display:block; }
    .gameday-container { display:flex; flex-direction:column; height:100%; gap:10px; }
    .card-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; flex:1; min-height:0; }
    .lineup-card { background:var(--surface-light); border-radius:16px; border:1px solid var(--border-light); display:flex; flex-direction:column; overflow:hidden; box-shadow:var(--card-shadow); }
    .card-head { padding:8px 10px; border-bottom:2px solid var(--border-light); display:flex; gap:8px; align-items:center; flex-wrap:nowrap; background:rgba(0,0,0,0.02); }
    .card-head.visitor { border-left:4px solid #3b82f6; }
    .card-head.home { border-left:4px solid var(--accent-red); }
    .team-label { font-size:0.6rem; text-transform:uppercase; font-weight:700; margin-right:-4px; white-space:nowrap; }
    .team-select-wrapper { position:relative; flex:2; }
    .team-select-wrapper::after { content:"▼"; position:absolute; right:8px; top:50%; transform:translateY(-50%); pointer-events:none; font-size:0.6rem; color:var(--team-select-border); }
    .team-select { width:100%; padding:8px; border-radius:10px; font-weight:600; font-size:0.85rem; background:var(--team-select-bg); color:var(--team-select-text); border:2px solid var(--team-select-border); min-height:var(--touch-target); appearance:none; -webkit-appearance:none; }
    .lineup-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .lineup-table { width:100%; border-collapse:collapse; font-size:0.8rem; }
    .lineup-table th { text-align:left; padding:6px 4px; background:rgba(198,28,56,0.85); color:#fff; position:sticky; top:0; z-index:2; font-weight:700; border-bottom:2px solid var(--border-light); backdrop-filter:blur(4px); }
    .lineup-table td { padding:4px 4px; border-bottom:1px solid var(--border-light); vertical-align:middle; color:var(--text-light); }
    body.dark-mode .lineup-table td, body.dark-mode .lineup-table input, body.dark-mode .lineup-table select { color:var(--text-dark); }
    .row-current { background:rgba(230,180,34,0.35)!important; border-left:5px solid var(--primary-gold); }
    .row-current td { font-weight:700; }
    body.dark-mode .row-current { background:rgba(255,215,0,0.55)!important; border-left-color:#ffd700; }
    body.dark-mode .row-current td { color:#000!important; }
    .row-ondeck { background:rgba(100,116,139,0.10); }
    .atbat-btn { background:transparent; border:2px solid #3b82f6; color:#3b82f6; padding:6px 10px; border-radius:24px; font-weight:800; font-size:0.7rem; cursor:pointer; min-width:70px; min-height:var(--touch-target); touch-action:manipulation; transition:transform 60ms ease,opacity 60ms ease; }
    .atbat-btn:hover { background:#3b82f6; color:#fff; }
    .atbat-btn:active { transform:scale(0.94); opacity:0.7; }
    body.dark-mode .atbat-btn { border-color:#60a5fa; color:#60a5fa; }
    .drag-handle { cursor:grab; font-size:1rem; margin-right:3px; user-select:none; }
    select, input { background:var(--surface-light); border:1px solid var(--border-light); padding:6px 5px; border-radius:8px; font-size:0.78rem; width:100%; min-height:var(--touch-target); color:var(--text-light); }
    .combo-wrapper { position:relative; width:100%; }
    .combo-wrapper input { width:100%; padding-right:22px; }
    .combo-wrapper::after { content:"▼"; position:absolute; right:6px; top:50%; transform:translateY(-50%); pointer-events:none; font-size:0.55rem; color:var(--text-light); opacity:0.6; }
    .broadcast-hud { background:#020617; color:#0ef; font-family:'Share Tech Mono',monospace; font-size:0.85rem; font-weight:700; padding:6px 14px; text-align:center; letter-spacing:0.5px; border-top:2px solid var(--primary-gold); flex-shrink:0; }
    .roster-layout { display:grid; grid-template-columns:240px 1fr; gap:10px; height:100%; }
    .team-sidebar { background:var(--surface-light); border-radius:16px; padding:10px; overflow-y:auto; }
    .team-item { padding:8px; border-radius:8px; margin-bottom:4px; cursor:pointer; background:rgba(0,0,0,0.04); font-weight:600; font-size:0.85rem; min-height:var(--touch-target); display:flex; align-items:center; transition:transform 60ms ease,opacity 60ms ease; }
    .team-item:active { opacity:0.7; transform:scale(0.94); }
    .team-item.active { background:var(--primary-gold); color:#0a1c3a; }
    .roster-workspace { background:var(--surface-light); border-radius:16px; padding:10px; overflow-y:auto; }
    .player-row { display:grid; grid-template-columns:50px 1fr 70px 1fr 1fr 34px; gap:5px; margin-bottom:5px; align-items:center; }
    .script-area { width:100%; height:70vh; font-family:monospace; padding:10px; border-radius:12px; border:1px solid var(--border-light); background:var(--surface-light); font-size:0.9rem; }
    .admin-panel { background:var(--surface-light); border-radius:16px; padding:14px; max-width:700px; }
    footer {
      background:var(--primary-navy); padding:6px 14px; padding-bottom:calc(6px + env(safe-area-inset-bottom));
      display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
      font-size:0.7rem; color:#94a3b8; flex-shrink:0; gap:8px;
    }
    .footer-logo { height:30px; width:auto; background:var(--primary-gold); border-radius:5px; padding:2px; }
    .footer-left, .footer-right { display:flex; align-items:center; gap:8px; }
    footer a { color:var(--accent-red); text-decoration:none; font-weight:600; }
    .footer-text { color:var(--accent-red); font-weight:600; }
    .author-name { color:var(--accent-red); font-weight:600; }
    .copyright-red { color:var(--accent-red); font-weight:600; }
    .clock-footer { font-family:'Share Tech Mono',monospace; font-weight:700; padding:3px 8px; letter-spacing:1px; font-size:12px; border-radius:4px; }
    .clock-footer.clock-espn-red{background:#111;color:#fff;border-bottom:2px solid var(--accent-red);}
    .clock-footer.clock-modern-blue{background:#1e3a8a;color:#fff;border-bottom:2px solid var(--primary-gold);}
    .clock-footer.clock-classic{background:#333;color:#0f0;border-bottom:2px solid #0f0;}
    .clock-footer.clock-minimal{background:#f4f4f4;color:#111;border:1px solid #ccc;}
    .clock-footer.clock-neon{background:#000;color:#0ff;border-bottom:2px solid #0ff;text-shadow:0 0 6px #0ff;}
    .clock-footer.clock-bold{background:#fff;color:#000;font-weight:900;border-top:2px solid var(--accent-red);}
    .clock-footer.clock-split{background:#222;color:#fff;border:1px solid #555;font-family:'Courier New',monospace;}
    .clock-footer.clock-led{background:#000;color:#0f0;border:1px solid #333;font-family:'Courier New',monospace;}
    .clock-footer.clock-pill{background:linear-gradient(135deg,#2b2b2b,#444);color:#fff;border-radius:16px;}
    .btn-sm { background:rgba(0,0,0,0.05); border:1px solid var(--border-light); padding:6px 10px; border-radius:20px; cursor:pointer; font-weight:600; font-size:0.75rem; min-height:var(--touch-target); touch-action:manipulation; transition:transform 60ms ease,opacity 60ms ease; }
    .btn-sm:active { opacity:0.7; transform:scale(0.94); }
    .btn-danger { background:var(--accent-red); color:#fff; }
    @media(max-width:900px){ .card-grid{grid-template-columns:1fr;} .roster-layout{grid-template-columns:1fr;} }
    @media print {
      header,nav,.timer-pill,.broadcast-hud,footer,.atbat-btn,.btn-sm,.reset-pill,.header-btn,.theme-toggle,.tool-section,.timers-area{display:none!important;}
      body{background:#fff;color:#000;height:auto;overflow:visible;font-size:12pt;}
      main{overflow:visible;padding:0;}
      .card-grid{grid-template-columns:1fr 1fr;gap:10px;}
      .card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;}
      .card-head{background:#f0f0f0;}
      th{background:#e0e0e0;color:#000;}
      .row-current{background:#fff9c4!important;}
      .drag-handle{display:none;}
      .combo-wrapper::after{display:none;}
    }
    .lineup-table td:first-child{white-space:nowrap;}

    /* ═══ SCOREBUG PILL ═══ */
    .scorebug-pill {
      background:rgba(0,0,0,0.35); border:2px solid var(--accent-red); border-radius:40px;
      padding:4px 14px; display:flex; align-items:center; gap:8px;
      font-family:'Share Tech Mono',monospace; flex-shrink:0;
    }
    .scorebug-pill .sb-block { display:flex; flex-direction:column; align-items:center; min-width:38px; }
    .scorebug-pill .sb-abbr { font-size:9px; font-weight:700; text-transform:uppercase; color:var(--primary-gold); letter-spacing:0.5px; }
    .scorebug-pill .sb-row { display:flex; align-items:center; gap:3px; }
    .scorebug-pill .sb-val { font-size:16px; font-weight:700; color:#fff; min-width:20px; text-align:center; }
    .scorebug-pill .sb-inning .sb-val { font-size:16px; color:var(--primary-gold); min-width:24px; }
    .scorebug-pill button {
      background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.25); color:#fff;
      width:32px; height:32px; border-radius:50%; cursor:pointer;
      font-size:14px; font-weight:700; display:inline-flex; align-items:center; justify-content:center;
      touch-action:manipulation; transition:background 80ms ease,transform 80ms ease; padding:0;
    }
    .scorebug-pill button:active { background:var(--accent-red); border-color:#fff; transform:scale(0.88); }
  </style>
</head>
<body>

<header>
  <div class="brand-section">
    <img src="logos/voiceofdfw.jpg" class="logo-main" id="mainLogo" alt="Voice of DFW Logo"
         onerror="this.style.background='#e6b422';this.style.minWidth='42px';this.style.borderRadius='6px';this.style.padding='3px';">
    <div class="brand-text">
      <h1>LINEUP CARD LIVE</h1>
      <p>DIGITAL PRESSBOX</p>
    </div>
  </div>

  <div class="timers-area">
    <div class="timer-pill">
      <span class="timer-label">⚾ 1st</span>
      <span class="timer-value" id="firstPitchDisplay">--:--</span>
      <button type="button" class="btn-icon green" onclick="markPitch()" aria-label="Mark first pitch">⏺</button>
      <button type="button" class="btn-icon" onclick="setCountdown()" aria-label="Set countdown">⏳</button>
    </div>
    <div class="timer-pill">
      <span class="timer-label">⛈️ WX</span>
      <span class="timer-value" id="wxTimerDisplay">--:--</span>
      <button type="button" class="btn-icon wx-color" onclick="startWx()" aria-label="Start WX timer">▶</button>
      <button type="button" class="btn-icon wx-color" onclick="resetWx()" aria-label="Reset WX timer">◼</button>
    </div>
  </div>

  <div class="scorebug-pill">
    <div class="sb-block">
      <span class="sb-abbr" id="scoreAwayAbbr">AWAY</span>
      <div class="sb-row">
        <button type="button" onclick="chRuns('away',-1)" aria-label="Subtract away run">−</button>
        <span class="sb-val" id="scoreAwayRuns">0</span>
        <button type="button" onclick="chRuns('away',1)" aria-label="Add away run">+</button>
      </div>
    </div>
    <div class="sb-inning">
      <button type="button" onclick="chInning(-1)" aria-label="Previous inning">−</button>
      <span class="sb-val" id="scoreInning">1</span>
      <button type="button" onclick="chInning(1)" aria-label="Next inning">+</button>
    </div>
    <div class="sb-block">
      <span class="sb-abbr" id="scoreHomeAbbr">HOME</span>
      <div class="sb-row">
        <button type="button" onclick="chRuns('home',-1)" aria-label="Subtract home run">−</button>
        <span class="sb-val" id="scoreHomeRuns">0</span>
        <button type="button" onclick="chRuns('home',1)" aria-label="Add home run">+</button>
      </div>
    </div>
  </div>

  <div class="tool-section">
    <button type="button" class="header-btn" onclick="printBothLineups()">🖨️ PRINT</button>
    <button type="button" class="reset-pill" onclick="confirmResetGame()">↺ RESET</button>
    <div class="theme-toggle">
      <button type="button" class="theme-btn active" id="lightModeBtn" onclick="setTheme('light')">☀️</button>
      <button type="button" class="theme-btn" id="darkModeBtn" onclick="setTheme('dark')">🌙</button>
    </div>
  </div>
</header>

<nav>
  <button class="nav-link active" data-view="gameday">📋 GAMEDAY</button>
  <button class="nav-link" data-view="roster">📋 ROSTERS</button>
  <button class="nav-link" data-view="script">🎙️ SCRIPT</button>
  <button class="nav-link" data-view="admin">⚙️ ADMIN</button>
</nav>

<div id="main-container"><main>
  <div id="gameday" class="view-pane active">
    <div class="gameday-container">
      <div class="card-grid">
        <div class="lineup-card"><div class="card-head visitor"><span class="team-label">AWAY</span><div class="team-select-wrapper"><select id="visitorTeamSelect" class="team-select"></select></div><button class="btn-sm" onclick="clearSide('visitor')">CLEAR</button></div><div class="lineup-scroll"><table class="lineup-table"><thead><tr><th scope="col" style="width:60px">ORDER</th><th scope="col">PLAYER</th><th scope="col" style="width:85px">POS</th><th scope="col" style="width:55px">AB</th></tr></thead><tbody id="visitorLineupBody"></tbody></table></div></div>
        <div class="lineup-card"><div class="card-head home"><span class="team-label">HOME</span><div class="team-select-wrapper"><select id="homeTeamSelect" class="team-select"></select></div><button class="btn-sm" onclick="clearSide('home')">CLEAR</button></div><div class="lineup-scroll"><table class="lineup-table"><thead><tr><th scope="col" style="width:60px">ORDER</th><th scope="col">PLAYER</th><th scope="col" style="width:85px">POS</th><th scope="col" style="width:55px">AB</th></tr></thead><tbody id="homeLineupBody"></tbody></table></div></div>
      </div>
    </div>
  </div>
  <div id="roster" class="view-pane"><div class="roster-layout"><div class="team-sidebar"><h3>🏆 TEAM LIBRARY</h3><div id="teamListContainer"></div><button class="btn-sm" style="margin-top:10px;width:100%" onclick="newTeam()">+ NEW TEAM</button></div><div class="roster-workspace" id="rosterWorkspace"></div></div></div>
  <div id="script" class="view-pane"><div style="background:var(--surface-light);border-radius:16px;padding:14px;height:100%;display:flex;flex-direction:column;"><div style="display:flex;gap:8px;margin-bottom:10px;"><button class="btn-sm" onclick="printScript()">🖨️</button><button class="btn-sm" onclick="document.getElementById('scriptFileInput').click()">📂</button><button class="btn-sm btn-danger" onclick="clearScript()">CLEAR</button></div><textarea id="scriptTextarea" class="script-area" placeholder="Announcer notes..."></textarea><input type="file" id="scriptFileInput" hidden accept=".txt,.csv" onchange="loadScriptFile(this)"></div></div>
  <div id="admin" class="view-pane"><div class="admin-panel" id="adminPanel"></div></div>
</main></div>

<div class="broadcast-hud" id="hudDisplay" role="status" aria-live="polite">⚾ AT BAT: -- | ON DECK: --</div>

<footer>
  <div class="footer-left"><span class="copyright-red">© 2026</span> <a href="https://voiceofdfw.com">Voice of DFW</a> | <span class="author-name">Clayton E. Greenberg</span></div>
  <img src="logos/Gold4.png" class="footer-logo" alt="Voice of DFW Logo"
       onerror="this.style.background='#e6b422';this.style.minWidth='30px';this.style.borderRadius='5px';this.style.padding='2px';">
  <div class="footer-right"><span class="footer-text">DIGITAL PRESSBOX COMMAND CENTER</span><span class="clock-footer clock-espn-red" id="footerClock">00:00:00</span></div>
</footer>

<script>
(function(){

var STATE = {
  teams: {},
  game: { visitor:{teamId:"",lineup:[],battingIdx:-1,onDeck:0,runs:0}, home:{teamId:"",lineup:[],battingIdx:-1,onDeck:0,runs:0}, inning:1 },
  awayAbbr:'', homeAbbr:'',
  wxTimer:null, wxSeconds:0, cdTimer:null, cdTarget:null,
  settings: { brand:"LINEUP CARD LIVE", subtext:"DIGITAL PRESSBOX", clockStyle:"espn-red", theme:"light" }
};

var POSITIONS = ["P","C","1B","2B","3B","SS","LF","CF","RF","DH","NA","PR","CR","X"];
var POSMAP = {P:1,C:2,"1B":3,"2B":4,"3B":5,SS:6,LF:7,CF:8,RF:9};

function mkLineup(){ var a=[]; for(var i=0;i<11;i++) a.push({num:"",name:"",pos:i===9?"DH":i===10?"P":"CF",pron:"",notes:""}); return a; }

// Load data
(function(){
  try{ var t=localStorage.getItem("vdw_teams"); STATE.teams=t?JSON.parse(t):{}; }catch(e){}
  // Only add demo if teams is empty
  if(Object.keys(STATE.teams).length===0){
    STATE.teams.demo={id:"demo",name:"DFW STARS",players:[]};
    for(var i=1;i<=11;i++) STATE.teams.demo.players.push({number:String(i),name:"Player "+i,position:i===10?"DH":i===11?"P":"CF",pronunciation:"",college:""});
  }
  try{ var g=localStorage.getItem("vdw_game"); if(g) STATE.game=JSON.parse(g); else{ STATE.game.visitor.lineup=mkLineup(); STATE.game.home.lineup=mkLineup(); } }catch(e){ STATE.game.visitor.lineup=mkLineup(); STATE.game.home.lineup=mkLineup(); }
  try{ var s=localStorage.getItem("vdw_settings"); if(s) STATE.settings=JSON.parse(s); }catch(e){}
  STATE.game.visitor.runs=STATE.game.visitor.runs||0; STATE.game.home.runs=STATE.game.home.runs||0; STATE.game.inning=STATE.game.inning||1;
})();

function saveGame(){ localStorage.setItem("vdw_game",JSON.stringify(STATE.game)); }
function saveTeams(){ localStorage.setItem("vdw_teams",JSON.stringify(STATE.teams)); }
function saveSettings(){ localStorage.setItem("vdw_settings",JSON.stringify(STATE.settings)); }

// Wake Lock
async function keepAwake(){ try{ await navigator.wakeLock.request('screen'); }catch(e){} }
keepAwake();

// Countdown
function markPitch(){
  if(STATE.cdTimer){ clearInterval(STATE.cdTimer); STATE.cdTimer=null; }
  STATE.cdTarget=null;
  var d=new Date();
  var h=d.getHours(); var ampm=h>=12?'PM':'AM'; h=h%12; h=h||12;
  document.getElementById("firstPitchDisplay").innerText=h+':'+String(d.getMinutes()).padStart(2,'0');
  document.getElementById("firstPitchDisplay").classList.remove("red-flash");
}
function setCountdown(){
  var inp=prompt("Enter countdown time (HH:MM):");
  if(!inp) return;
  var parts=inp.split(':');
  if(parts.length!==2){ alert("Use format HH:MM"); return; }
  var hh=parseInt(parts[0]), mm=parseInt(parts[1]);
  if(isNaN(hh)||isNaN(mm)){ alert("Invalid numbers"); return; }
  var target=new Date();
  target.setHours(target.getHours()+hh,target.getMinutes()+mm,0,0);
  STATE.cdTarget=target;
  if(STATE.cdTimer) clearInterval(STATE.cdTimer);
  function tick(){
    var diff=STATE.cdTarget-new Date();
    var el=document.getElementById("firstPitchDisplay");
    if(!el) return;
    if(diff<=0){ el.innerText="00:00"; el.classList.add("red-flash"); clearInterval(STATE.cdTimer); STATE.cdTimer=null; }
    else { var ts=Math.floor(diff/1000); var m=Math.floor(ts/60); var s=ts%60; el.innerText=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); el.classList.remove("red-flash"); }
  }
  tick(); STATE.cdTimer=setInterval(tick,500);
}

// WX
function startWx(){
  if(STATE.wxTimer) clearInterval(STATE.wxTimer);
  STATE.wxSeconds=1800; var el=document.getElementById("wxTimerDisplay"); el.classList.remove("red-flash");
  function tick(){ if(STATE.wxSeconds<=0){ el.innerText="00:00"; el.classList.add("red-flash"); clearInterval(STATE.wxTimer); return; } var m=Math.floor(STATE.wxSeconds/60),s=STATE.wxSeconds%60; el.innerText=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); STATE.wxSeconds--; }
  tick(); STATE.wxTimer=setInterval(tick,1000);
}
function resetWx(){ if(STATE.wxTimer) clearInterval(STATE.wxTimer); STATE.wxSeconds=0; document.getElementById("wxTimerDisplay").innerText="--:--"; document.getElementById("wxTimerDisplay").classList.remove("red-flash"); }

// Scorebug
function chRuns(side,d){ var s=(side==='away'||side==='visitor')?'visitor':'home'; STATE.game[s].runs=Math.max(0,(STATE.game[s].runs||0)+d); updateSB(); saveGame(); }
function chInning(d){ STATE.game.inning=Math.max(1,Math.min(99,(STATE.game.inning||1)+d)); updateSB(); saveGame(); }
function updateSB(){
  var an=STATE.teams[STATE.game.visitor.teamId]?STATE.teams[STATE.game.visitor.teamId].name:'AWAY';
  var hn=STATE.teams[STATE.game.home.teamId]?STATE.teams[STATE.game.home.teamId].name:'HOME';
  document.getElementById('scoreAwayAbbr').textContent=(STATE.awayAbbr||an).substring(0,5).toUpperCase();
  document.getElementById('scoreHomeAbbr').textContent=(STATE.homeAbbr||hn).substring(0,5).toUpperCase();
  document.getElementById('scoreAwayRuns').textContent=STATE.game.visitor.runs||0;
  document.getElementById('scoreHomeRuns').textContent=STATE.game.home.runs||0;
  document.getElementById('scoreInning').textContent=STATE.game.inning<=9?STATE.game.inning:'X';
}

// Render
function renderDDs(){
  var opts='<option value="">-- SELECT TEAM --</option>';
  Object.keys(STATE.teams).forEach(function(k){ opts+='<option value="'+k+'">'+STATE.teams[k].name+'</option>'; });
  document.getElementById('visitorTeamSelect').innerHTML=opts;
  document.getElementById('homeTeamSelect').innerHTML=opts;
}
function renderLineup(side){
  var tbody=document.getElementById(side+'LineupBody'); if(!tbody) return;
  var lineup=STATE.game[side].lineup;
  var teamId=STATE.game[side].teamId;
  var team=STATE.teams[teamId];
  var bat=STATE.game[side].battingIdx;
  var od=(bat+1)%9;
  tbody.innerHTML="";
  var dlId='plist-'+side;
  if(team&&team.players){
    var old=document.getElementById(dlId); if(old) old.remove();
    var dl=document.createElement('datalist'); dl.id=dlId;
    dl.innerHTML=team.players.map(function(p){ var e=''; if(p.pronunciation||p.college) e=' — '+(p.pronunciation||'')+(p.college?' | '+p.college:''); return '<option value="'+(p.number||'')+' '+(p.name||'')+'">'+(p.number||'')+' '+(p.name||'')+e+'</option>'; }).join('');
    document.body.appendChild(dl);
  }
  for(var i=0;i<11;i++){
    var p=lineup[i]; var row=tbody.insertRow(); row.draggable=true; row.dataset.index=i;
    if(i===bat) row.className='row-current'; else if(i===od) row.className='row-ondeck';
    var ord=i<9?(i+1):(i===9?'DH':'P');
    var posOpts=''; for(var j=0;j<POSITIONS.length;j++){ var po=POSITIONS[j]; var nm=POSMAP[po]||''; var dp=po==='DH'?'DH':(nm?po+'·'+nm:po); posOpts+='<option value="'+po+'"'+(p.pos===po?' selected':'')+'>'+dp+'</option>'; }
    row.innerHTML='<td><span class="drag-handle">☰</span> '+ord+'</td><td><div class="combo-wrapper"><input list="'+dlId+'" value="'+(p.num+' '+p.name).trim()+'" placeholder="# Name" oninput="updPlayer(\''+side+'\','+i+',this.value)"></div></td><td><select onchange="updPos(\''+side+'\','+i+',this.value)">'+posOpts+'</select></td><td>'+(i<9?'<button class="atbat-btn" onclick="markAB(\''+side+'\','+i+')">AT BAT</button>':'')+'</td>';
  }
  updateHUD(); updateSB();
}
function updPlayer(side,idx,val){ var p=val.trim().split(' '); STATE.game[side].lineup[idx].num=p[0]||''; STATE.game[side].lineup[idx].name=p.slice(1).join(' ')||''; saveGame(); }
function updPos(side,idx,val){ STATE.game[side].lineup[idx].pos=val; saveGame(); }
function markAB(side,idx){
  if(navigator.vibrate) navigator.vibrate(20);
  STATE.game[side].battingIdx=idx; STATE.game[side].onDeck=(idx+1)%9;
  var other=side==='visitor'?'home':'visitor'; STATE.game[other].battingIdx=-1; STATE.game[other].onDeck=0;
  renderLineup('visitor'); renderLineup('home');
}
function updateHUD(){
  var b=null,od=null;
  if(STATE.game.visitor.battingIdx>=0){ b=STATE.game.visitor.lineup[STATE.game.visitor.battingIdx]; od=STATE.game.visitor.lineup[STATE.game.visitor.onDeck]; }
  else if(STATE.game.home.battingIdx>=0){ b=STATE.game.home.lineup[STATE.game.home.battingIdx]; od=STATE.game.home.lineup[STATE.game.home.onDeck]; }
  document.getElementById('hudDisplay').innerHTML='⚾ AT BAT: '+(b?b.num+' '+b.name:'--')+' | ON DECK: '+(od?od.num+' '+od.name:'--');
}
function loadTeam(side,id){
  if(!id||!STATE.teams[id]) return;
  var pl=STATE.teams[id].players; var L=[];
  for(var i=0;i<11;i++){ var p=pl[i]||{number:'',name:'',position:'CF'}; L.push({num:p.number||'',name:p.name||'',pos:p.position||'CF',pron:p.pronunciation||'',notes:p.college||''}); }
  STATE.game[side].lineup=L; STATE.game[side].teamId=id;
  renderLineup(side);
}

// Events
document.getElementById('visitorTeamSelect').onchange=function(){ loadTeam('visitor',this.value); };
document.getElementById('homeTeamSelect').onchange=function(){ loadTeam('home',this.value); };

function clearSide(side){ STATE.game[side].lineup=mkLineup(); STATE.game[side].teamId=''; STATE.game[side].battingIdx=-1; document.getElementById(side+'TeamSelect').value=''; renderLineup(side); }

function printBothLineups(){
  var vT=STATE.teams[STATE.game.visitor.teamId]?STATE.teams[STATE.game.visitor.teamId].name:'VISITOR';
  var hT=STATE.teams[STATE.game.home.teamId]?STATE.teams[STATE.game.home.teamId].name:'HOME';
  var h='<html><head><title>Lineup</title><style>body{font-family:monospace;padding:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #000;padding:5px}</style></head><body><h2>'+vT+'</h2><table><tr><th>Ord</th><th>Player</th><th>Pos</th></tr>';
  STATE.game.visitor.lineup.forEach(function(p,i){ h+='<tr><td>'+(i<9?i+1:i===9?'DH':'P')+'</td><td>'+p.num+' '+p.name+'</td><td>'+p.pos+'</td></tr>'; });
  h+='</table><h2>'+hT+'</h2><table><tr><th>Ord</th><th>Player</th><th>Pos</th></tr>';
  STATE.game.home.lineup.forEach(function(p,i){ h+='<tr><td>'+(i<9?i+1:i===9?'DH':'P')+'</td><td>'+p.num+' '+p.name+'</td><td>'+p.pos+'</td></tr>'; });
  h+='</table></body></html>'; var w=window.open(); w.document.write(h); w.print();
}

function confirmResetGame(){
  if(!confirm('Reset game?')) return;
  STATE.game.visitor.lineup=mkLineup(); STATE.game.home.lineup=mkLineup();
  STATE.game.visitor.teamId=''; STATE.game.home.teamId='';
  STATE.game.visitor.runs=0; STATE.game.home.runs=0; STATE.game.inning=1;
  STATE.game.visitor.battingIdx=-1; STATE.game.home.battingIdx=-1;
  document.getElementById('firstPitchDisplay').innerText='--:--'; resetWx();
  renderLineup('visitor'); renderLineup('home'); renderDDs();
}

function setTheme(mode){
  STATE.settings.theme=mode; saveSettings();
  document.body.classList.toggle('dark-mode',mode==='dark');
  document.getElementById('lightModeBtn').classList.toggle('active',mode==='light');
  document.getElementById('darkModeBtn').classList.toggle('active',mode==='dark');
}

// Script functions
function printScript(){ var w=window.open(); w.document.write('<pre>'+document.getElementById('scriptTextarea').value+'</pre>'); w.print(); }
function clearScript(){ document.getElementById('scriptTextarea').value=''; localStorage.removeItem('vdw_script'); }
function loadScriptFile(input){ var f=input.files[0]; if(!f) return; var r=new FileReader(); r.onload=function(e){ document.getElementById('scriptTextarea').value=e.target.result; localStorage.setItem('vdw_script',e.target.result); }; r.readAsText(f); }

// Roster functions
function newTeam(){ var id=Date.now().toString(); STATE.teams[id]={id:id,name:"New Team",players:[]}; saveTeams(); renderTeamList(); renderDDs(); editTeam(id); }
function renderTeamList(){ var c=document.getElementById('teamListContainer'); var h=''; Object.keys(STATE.teams).forEach(function(k){ h+='<div class="team-item" onclick="editTeam(\''+k+'\')">'+STATE.teams[k].name+'</div>'; }); c.innerHTML=h; }
function editTeam(id){
  var t=STATE.teams[id]; if(!t) return;
  var ws=document.getElementById('rosterWorkspace');
  ws.innerHTML='<input id="editTeamName" value="'+t.name+'" style="width:100%;margin-bottom:8px;padding:6px;border-radius:6px;border:1px solid var(--border);"><div style="display:grid;grid-template-columns:50px 1fr 70px 1fr 1fr 34px;gap:4px;font-size:0.6rem;font-weight:600;margin-bottom:4px;"><span>#</span><span>Name</span><span>Pos</span><span>Pron</span><span>Notes</span><span></span></div><div id="rosterEditGrid"></div><textarea id="parseRosterText" rows="2" placeholder="CSV: number,name,pos,pron,notes" style="width:100%;margin-top:8px;padding:6px;border-radius:6px;border:1px solid var(--border);"></textarea><div style="display:flex;gap:6px;margin-top:8px;"><button class="btn-sm" id="svBtn">💾 SAVE</button><button class="btn-sm" id="adBtn">➕ ADD</button><button class="btn-sm" id="prBtn">📝 PARSE</button></div>';
  var g=document.getElementById('rosterEditGrid');
  t.players.forEach(function(p){ addPRow(g,p); });
  document.getElementById('svBtn').onclick=function(){ t.name=document.getElementById('editTeamName').value; t.players=collectP(g); saveTeams(); renderTeamList(); renderDDs(); };
  document.getElementById('adBtn').onclick=function(){ addPRow(g,{number:'',name:'',position:'P',pronunciation:'',college:''}); };
  document.getElementById('prBtn').onclick=function(){ var txt=document.getElementById('parseRosterText').value; var ls=txt.split(/\r?\n/); g.innerHTML=''; ls.forEach(function(l){ if(!l.trim()) return; var p=l.split(','); addPRow(g,{number:p[0]||'',name:p[1]||'',position:p[2]||'',pronunciation:p[3]||'',college:p[4]||''}); }); };
}
function addPRow(g,p){
  var d=document.createElement('div'); d.className='player-row';
  d.innerHTML='<input value="'+(p.number||'')+'"><input value="'+(p.name||'')+'"><select>'+POSITIONS.map(function(x){ return '<option value="'+x+'"'+(p.position===x?' selected':'')+'>'+x+'</option>'; }).join('')+'</select><input value="'+(p.pronunciation||'')+'"><input value="'+(p.college||'')+'"><button style="background:var(--accent-red);color:#fff;border:none;border-radius:4px;cursor:pointer;" onclick="this.parentElement.remove()">✖</button>';
  g.appendChild(d);
}
function collectP(g){ var r=g.querySelectorAll('.player-row'); var a=[]; r.forEach(function(rw){ var inp=rw.querySelectorAll('input'); var sel=rw.querySelector('select'); a.push({number:inp[0].value,name:inp[1].value,position:sel.value,pronunciation:inp[2].value,college:inp[3].value}); }); return a; }

// Admin
function renderAdmin(){
  var p=document.getElementById('adminPanel');
  p.innerHTML='<h2>⚙️ ADMIN</h2><label>Brand:<input id="adminBrand" value="'+STATE.settings.brand+'"></label><label>Subtext:<input id="adminSubtext" value="'+STATE.settings.subtext+'"></label><label>Font Scale:<input type="range" id="fontScale" min="80" max="130" value="100"></label><h3>Scorebug Abbreviations</h3><label>Away:<input id="awayAbbr" value="'+STATE.awayAbbr+'" maxlength="5"></label><label>Home:<input id="homeAbbr" value="'+STATE.homeAbbr+'" maxlength="5"></label><button class="btn-sm" onclick="saveAdmin()">APPLY</button>';
}
function saveAdmin(){
  STATE.settings.brand=document.getElementById('adminBrand').value; STATE.settings.subtext=document.getElementById('adminSubtext').value;
  STATE.awayAbbr=document.getElementById('awayAbbr').value; STATE.homeAbbr=document.getElementById('homeAbbr').value;
  document.querySelector('.brand-text h1').textContent=STATE.settings.brand; document.querySelector('.brand-text p').textContent=STATE.settings.subtext;
  saveSettings(); updateSB();
}

// Nav
document.querySelectorAll('.nav-link').forEach(function(b){ b.onclick=function(){
  document.querySelectorAll('.view-pane').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(this.dataset.view).classList.add('active');
  document.querySelectorAll('.nav-link').forEach(function(n){ n.classList.remove('active'); });
  this.classList.add('active');
  if(this.dataset.view==='roster') renderTeamList();
  if(this.dataset.view==='admin') renderAdmin();
};});

// Footer clock
setInterval(function(){ document.getElementById('footerClock').innerText=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); },1000);

// Init
renderDDs(); renderLineup('visitor'); renderLineup('home'); updateSB();
// Restore theme
if(STATE.settings.theme==='dark') setTheme('dark');

// Script persistence
var savedScript=localStorage.getItem('vdw_script'); if(savedScript) document.getElementById('scriptTextarea').value=savedScript;
document.getElementById('scriptTextarea').oninput=function(){ localStorage.setItem('vdw_script',this.value); };

// Expose globally
window.markPitch=markPitch; window.setCountdown=setCountdown;
window.startWx=startWx; window.resetWx=resetWx;
window.chRuns=chRuns; window.chInning=chInning;
window.printBothLineups=printBothLineups; window.confirmResetGame=confirmResetGame;
window.setTheme=setTheme;
window.markAB=markAB; window.updPlayer=updPlayer; window.updPos=updPos;
window.clearSide=clearSide;
window.printScript=printScript; window.clearScript=clearScript; window.loadScriptFile=loadScriptFile;
window.newTeam=newTeam; window.editTeam=editTeam;
})();
</script>
