<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" sizes="180x180" href="_logos/apple-touch-icon4.png">
  <title>Lineup Card Live | Broadcast Command</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --navy: #1f3a5e; --gold: #e6b422; --red: #c41e3a;
      --bg: #f4f6fa; --surface: #f0f2f5; --text: #0f172a; --border: #dce3ec;
    }
    body.dark-mode { --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --border: #334155; }
    body {
      font-family: system-ui, sans-serif; background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 16px;
    }
    body::before { content:''; position:fixed; top:0; left:0; width:100%; height:4px; background:var(--red); z-index:2000; }

    header {
      background: var(--navy); color: #fff; padding: 8px 16px; display: flex;
      align-items: center; justify-content: space-between; border-bottom: 2px solid var(--gold);
      flex-shrink: 0; gap: 10px; min-height: 60px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { height: 38px; background: var(--gold); border-radius: 6px; padding: 3px; }
    .brand h1 { font-size: 1.2rem; line-height: 1.1; }
    .brand p { font-size: 0.55rem; color: var(--gold); text-transform: uppercase; }

    .timer { background: rgba(0,0,0,0.35); border: 2px solid var(--red); border-radius: 30px; padding: 5px 12px; display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .timer span:first-child { font-weight: 600; color: var(--gold); }
    .timer .val { font-family: monospace; font-weight: 700; }
    .timer button { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 4px 8px; border-radius: 14px; cursor: pointer; font-size: 0.7rem; }
    .timer button.green { background: #2e7d32; }

    .scorebug { display: flex; align-items: center; gap: 6px; background: #001a35; border-radius: 5px; padding: 4px 10px; border-bottom: 2px solid var(--red); font-family: monospace; font-size: 0.8rem; color: #fff; }
    .scorebug .team { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; text-align: center; }
    .scorebug .runs { font-size: 1.1rem; font-weight: 700; }
    .scorebug button { background: none; border: 1px solid rgba(255,255,255,0.3); color: #ccc; width: 20px; height: 20px; border-radius: 3px; cursor: pointer; font-size: 0.6rem; }

    nav { background: #374151; display: flex; padding: 0 10px; flex-shrink: 0; overflow-x: auto; }
    nav button { padding: 10px 16px; background: none; border: none; color: rgba(255,255,255,0.7); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; border-bottom: 3px solid transparent; }
    nav button.active { color: #fff; border-bottom-color: var(--gold); }

    main { flex: 1; padding: 10px; overflow: auto; }
    .view { display: none; }
    .view.active { display: block; }

    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 100%; }
    .card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .card-head { padding: 8px 10px; border-bottom: 2px solid var(--border); display: flex; gap: 8px; align-items: center; }
    .card-head.away { border-left: 4px solid #3b82f6; }
    .card-head.home { border-left: 4px solid var(--red); }
    .card-head select { flex: 1; padding: 8px; border-radius: 8px; border: 2px solid #1d4ed8; font-weight: 600; min-height: 40px; background: #f8f9fb; }

    .scroll { flex: 1; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { background: rgba(198,28,56,0.85); color: #fff; padding: 6px 4px; text-align: left; position: sticky; top: 0; }
    td { padding: 4px; border-bottom: 1px solid var(--border); }
    td input, td select { width: 100%; padding: 5px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.78rem; background: var(--surface); color: var(--text); }
    .atbat-btn { background: none; border: 2px solid #3b82f6; color: #3b82f6; padding: 4px 8px; border-radius: 20px; font-weight: 800; font-size: 0.7rem; cursor: pointer; }
    .row-batting { background: #fff9c4 !important; border-left: 5px solid #f9a825 !important; }

    .hud { background: #020617; color: #0ef; font-family: monospace; padding: 8px 16px; text-align: center; border-top: 2px solid var(--gold); flex-shrink: 0; font-size: 0.85rem; }

    footer {
      background: var(--navy); padding: 10px 16px; display: flex; align-items: center;
      justify-content: space-between; font-size: 0.75rem; color: #94a3b8; flex-shrink: 0; gap: 10px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }
    footer img { height: 32px; background: var(--gold); border-radius: 6px; padding: 3px; }
    footer a { color: var(--red); text-decoration: none; font-weight: 600; }
    .footer-red { color: var(--red); font-weight: 600; }
    .footer-clock { font-family: monospace; font-weight: 700; padding: 6px 14px; background: #111; color: #fff; border-radius: 5px; border-bottom: 2px solid var(--red); font-size: 15px; }

    @media (max-width: 768px) { .card-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <img src="_logos/lineup-card-live-logo.png" alt="Logo" onerror="this.style.background='var(--gold)';">
    <div><h1>LINEUP CARD LIVE</h1><p>BROADCAST COMMAND</p></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <div class="timer"><span>⚾ 1st</span><span class="val" id="pitchTime">--:--</span><button class="green" onclick="markPitch()">⏺</button><button onclick="setCountdown()">⏳</button></div>
    <div class="timer"><span>⛈️ WX</span><span class="val" id="wxTime">--:--</span><button onclick="startWx()">▶</button><button onclick="resetWx()">◼</button></div>
    <div class="scorebug">
      <div style="text-align:center;"><div class="team" id="sbAway">AWAY</div><div style="display:flex;align-items:center;gap:2px;"><button onclick="changeRuns('away',-1)">−</button><span class="runs" id="sbAwayRuns">0</span><button onclick="changeRuns('away',1)">+</button></div></div>
      <div style="display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:3px;"><button onclick="changeInning(-1)">◀</button><span id="sbInning">1</span><button onclick="changeInning(1)">▶</button></div>
      <div style="text-align:center;"><div class="team" id="sbHome">HOME</div><div style="display:flex;align-items:center;gap:2px;"><button onclick="changeRuns('home',-1)">−</button><span class="runs" id="sbHomeRuns">0</span><button onclick="changeRuns('home',1)">+</button></div></div>
    </div>
    <button style="background:var(--red);color:#fff;border:none;padding:6px 14px;border-radius:20px;font-weight:800;cursor:pointer;" onclick="resetGame()">↺ RESET</button>
    <button onclick="toggleDark()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;">🌙</button>
  </div>
</header>

<nav>
  <button class="nav-link active" data-view="gameday">📋 GAMEDAY</button>
  <button class="nav-link" data-view="roster">👥 ROSTERS</button>
  <button class="nav-link" data-view="script">🎙️ SCRIPT</button>
  <button class="nav-link" data-view="admin">⚙️ ADMIN</button>
</nav>

<main>
  <div id="gameday" class="view active">
    <div class="card-grid">
      <div class="card"><div class="card-head away"><span style="font-size:0.6rem;font-weight:700;">AWAY</span><select id="awaySelect"><option>-- SELECT --</option></select><button style="padding:6px 10px;border-radius:20px;cursor:pointer;">CLEAR</button></div><div class="scroll"><table><thead><tr><th>ORD</th><th>PLAYER</th><th>POS</th><th>AB</th></tr></thead><tbody id="awayBody"></tbody></table></div></div>
      <div class="card"><div class="card-head home"><span style="font-size:0.6rem;font-weight:700;">HOME</span><select id="homeSelect"><option>-- SELECT --</option></select><button style="padding:6px 10px;border-radius:20px;cursor:pointer;">CLEAR</button></div><div class="scroll"><table><thead><tr><th>ORD</th><th>PLAYER</th><th>POS</th><th>AB</th></tr></thead><tbody id="homeBody"></tbody></table></div></div>
    </div>
  </div>
  <div id="roster" class="view"><p>Roster coming soon</p></div>
  <div id="script" class="view"><p>Script coming soon</p></div>
  <div id="admin" class="view"><p>Admin coming soon</p></div>
</main>

<div class="hud">⚾ AT BAT: -- | ON DECK: --</div>

<footer>
  <span>© 2026 <a href="https://voiceofdfw.com">Voice of DFW</a> | <span class="footer-red">Clayton E. Greenberg</span></span>
  <img src="_logos/Gold4.png" alt="Logo" onerror="this.style.background='var(--gold)';">
  <div><span class="footer-red">PA Broadcast Command Center</span> <span class="footer-clock" id="footerClock">00:00:00</span></div>
</footer>

<script>
// ═══════════════════════════════════════
// SIMPLE WORKING VERSION
// ═══════════════════════════════════════

var state = {
  teams: { demo: { id:'demo', name:'DFW STARS', players: [
    {num:'1',name:'Player 1',pos:'P'},{num:'2',name:'Player 2',pos:'C'},{num:'3',name:'Player 3',pos:'1B'},
    {num:'4',name:'Player 4',pos:'2B'},{num:'5',name:'Player 5',pos:'3B'},{num:'6',name:'Player 6',pos:'SS'},
    {num:'7',name:'Player 7',pos:'LF'},{num:'8',name:'Player 8',pos:'CF'},{num:'9',name:'Player 9',pos:'RF'},
    {num:'10',name:'DH Player',pos:'DH'},{num:'11',name:'Pitcher',pos:'P'}
  ]}},
  awayTeam: '', homeTeam: '',
  awayRuns: 0, homeRuns: 0, inning: 1,
  awayLineup: [], homeLineup: [],
  awayBatting: 0, homeBatting: 0,
  dark: false
};

// Initialize lineups
for (var i = 0; i < 11; i++) {
  state.awayLineup.push({num:'',name:'',pos:i===9?'DH':i===10?'P':'CF'});
  state.homeLineup.push({num:'',name:'',pos:i===9?'DH':i===10?'P':'CF'});
}

var positions = ['P','C','1B','2B','3B','SS','LF','CF','RF','DH','NA','PR','CR','X'];

// ═══ RENDER ═══
function renderLineup(side) {
  var tbody = document.getElementById(side + 'Body');
  var lineup = side === 'away' ? state.awayLineup : state.homeLineup;
  var battingIdx = side === 'away' ? state.awayBatting : state.homeBatting;
  tbody.innerHTML = '';
  for (var i = 0; i < 11; i++) {
    var p = lineup[i];
    var row = tbody.insertRow();
    if (i === battingIdx) row.className = 'row-batting';
    var orderText = i < 9 ? (i+1) : (i === 9 ? 'DH' : 'P');
    var posOpts = '';
    for (var j = 0; j < positions.length; j++) {
      posOpts += '<option value="'+positions[j]+'"'+(p.pos===positions[j]?' selected':'')+'>'+positions[j]+'</option>';
    }
    row.innerHTML = '<td>'+orderText+'</td>'+
      '<td><input value="'+(p.num+' '+p.name).trim()+'" onchange="updatePlayer(\''+side+'\','+i+',this.value)"></td>'+
      '<td><select onchange="updatePos(\''+side+'\','+i+',this.value)">'+posOpts+'</select></td>'+
      '<td>'+(i<9?'<button class="atbat-btn" onclick="markAtBat(\''+side+'\','+i+')">AT BAT</button>':'')+'</td>';
  }
}

function updatePlayer(side, idx, val) {
  var parts = val.trim().split(' ');
  var lineup = side === 'away' ? state.awayLineup : state.homeLineup;
  lineup[idx].num = parts[0] || '';
  lineup[idx].name = parts.slice(1).join(' ') || '';
}

function updatePos(side, idx, val) {
  var lineup = side === 'away' ? state.awayLineup : state.homeLineup;
  lineup[idx].pos = val;
}

function markAtBat(side, idx) {
  if (side === 'away') { state.awayBatting = idx; state.homeBatting = -1; }
  else { state.homeBatting = idx; state.awayBatting = -1; }
  renderLineup('away'); renderLineup('home');
  updateHUD();
}

function updateHUD() {
  var batter = null;
  if (state.awayBatting >= 0) batter = state.awayLineup[state.awayBatting];
  else if (state.homeBatting >= 0) batter = state.homeLineup[state.homeBatting];
  document.querySelector('.hud').innerHTML = '⚾ AT BAT: '+(batter?batter.num+' '+batter.name:'--')+' | ON DECK: --';
}

function renderDropdowns() {
  var opts = '<option value="">-- SELECT TEAM --</option>';
  var keys = Object.keys(state.teams);
  for (var i = 0; i < keys.length; i++) {
    opts += '<option value="'+keys[i]+'">'+state.teams[keys[i]].name+'</option>';
  }
  document.getElementById('awaySelect').innerHTML = opts;
  document.getElementById('homeSelect').innerHTML = opts;
}

function loadTeam(side, teamId) {
  if (!teamId || !state.teams[teamId]) return;
  var players = state.teams[teamId].players;
  var lineup = [];
  for (var i = 0; i < 11; i++) {
    var p = players[i] || {num:'',name:'',pos:'CF'};
    lineup.push({num:p.num||p.number||'', name:p.name||'', pos:p.pos||'CF'});
  }
  if (side === 'away') { state.awayLineup = lineup; state.awayTeam = teamId; }
  else { state.homeLineup = lineup; state.homeTeam = teamId; }
  renderLineup(side);
  updateScorebug();
}

// ═══ SCOREBUG ═══
function changeRuns(side, delta) {
  if (side === 'away') state.awayRuns = Math.max(0, state.awayRuns + delta);
  else state.homeRuns = Math.max(0, state.homeRuns + delta);
  updateScorebug();
}

function changeInning(delta) {
  state.inning = Math.max(1, Math.min(10, state.inning + delta));
  updateScorebug();
}

function updateScorebug() {
  var awayName = state.teams[state.awayTeam] ? state.teams[state.awayTeam].name : 'AWAY';
  var homeName = state.teams[state.homeTeam] ? state.teams[state.homeTeam].name : 'HOME';
  document.getElementById('sbAway').textContent = awayName.substring(0,6).toUpperCase();
  document.getElementById('sbHome').textContent = homeName.substring(0,6).toUpperCase();
  document.getElementById('sbAwayRuns').textContent = state.awayRuns;
  document.getElementById('sbHomeRuns').textContent = state.homeRuns;
  document.getElementById('sbInning').textContent = state.inning <= 9 ? state.inning : 'EXTRA';
}

// ═══ TIMERS ═══
function markPitch() {
  document.getElementById('pitchTime').textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

var wxTimer = null, wxSeconds = 0;
function startWx() {
  if (wxTimer) clearInterval(wxTimer);
  wxSeconds = 1800;
  function tick() {
    if (wxSeconds <= 0) { document.getElementById('wxTime').textContent = '00:00'; clearInterval(wxTimer); return; }
    var m = Math.floor(wxSeconds/60), s = wxSeconds%60;
    document.getElementById('wxTime').textContent = m+':'+(s<10?'0'+s:s);
    wxSeconds--;
  }
  tick(); wxTimer = setInterval(tick, 1000);
}

function resetWx() {
  if (wxTimer) clearInterval(wxTimer);
  wxSeconds = 0;
  document.getElementById('wxTime').textContent = '--:--';
}

var countdownTimer = null;
function setCountdown() {
  var input = prompt('Enter countdown (HH:MM):');
  if (!input) return;
  var parts = input.split(':');
  var target = new Date();
  target.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
  if (target <= new Date()) target.setDate(target.getDate()+1);
  if (countdownTimer) clearInterval(countdownTimer);
  function tick() {
    var diff = target - new Date();
    if (diff <= 0) { document.getElementById('pitchTime').textContent = '00:00'; clearInterval(countdownTimer); return; }
    var m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
    document.getElementById('pitchTime').textContent = m+':'+(s<10?'0'+s:s);
  }
  tick(); countdownTimer = setInterval(tick, 200);
}

function resetGame() {
  if (!confirm('Reset game?')) return;
  state.awayLineup = []; state.homeLineup = [];
  for (var i = 0; i < 11; i++) {
    state.awayLineup.push({num:'',name:'',pos:i===9?'DH':i===10?'P':'CF'});
    state.homeLineup.push({num:'',name:'',pos:i===9?'DH':i===10?'P':'CF'});
  }
  state.awayRuns = 0; state.homeRuns = 0; state.inning = 1;
  state.awayBatting = -1; state.homeBatting = -1;
  document.getElementById('pitchTime').textContent = '--:--';
  resetWx();
  renderLineup('away'); renderLineup('home');
  updateScorebug(); updateHUD();
}

function toggleDark() {
  state.dark = !state.dark;
  document.body.classList.toggle('dark-mode', state.dark);
}

// ═══ FOOTER CLOCK ═══
function updateFooterClock() {
  var el = document.getElementById('footerClock');
  if (el) el.textContent = new Date().toLocaleTimeString();
}

// ═══ INIT ═══
renderDropdowns();
renderLineup('away');
renderLineup('home');
updateScorebug();
updateHUD();
updateFooterClock();
setInterval(updateFooterClock, 1000);

// Events
document.getElementById('awaySelect').onchange = function() { loadTeam('away', this.value); };
document.getElementById('homeSelect').onchange = function() { loadTeam('home', this.value); };

document.querySelectorAll('.nav-link').forEach(function(btn) {
  btn.onclick = function() {
    document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
    document.getElementById(this.dataset.view).classList.add('active');
    document.querySelectorAll('.nav-link').forEach(function(b) { b.classList.remove('active'); });
    this.classList.add('active');
  };
});

document.querySelector('.card-head.away button').onclick = function() {
  state.awayLineup = []; state.awayTeam = '';
  for (var i = 0; i < 11; i++) state.awayLineup.push({num:'',name:'',pos:i===9?'DH':i===10?'P':'CF'});
  document.getElementById('awaySelect').value = '';
  renderLineup('away'); updateScorebug();
};

document.querySelector('.card-head.home button').onclick = function() {
  state.homeLineup = []; state.homeTeam = '';
  for (var i = 0; i < 11; i++) state.homeLineup.push({num:'',name:'',pos:i===9?'DH':i===10?'P':'CF'});
  document.getElementById('homeSelect').value = '';
  renderLineup('home'); updateScorebug();
};
</script>
</body>
</html>
