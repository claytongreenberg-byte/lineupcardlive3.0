<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" sizes="180x180" href="_logos/apple-touch-icon4.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lineup Card">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lineup Card Live | Digital Pressbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --primary-navy:#1f3a5e; --primary-gold:#e6b422; --accent-red:#c41e3a;
      --bg-light:#f4f6fa; --surface-light:#f0f2f5; --text-light:#0f172a; --border-light:#dce3ec;
      --bg-dark:#0f172a; --surface-dark:#1e293b; --text-dark:#f1f5f9; --border-dark:#334155;
      --touch-target:44px; --font-base:17px;
      --team-select-bg:#f8f9fb; --team-select-text:#0f172a; --team-select-border:#1d4ed8;
      --card-shadow:0 8px 20px rgba(0,0,0,0.06);
    }
    body.dark-mode {
      --bg-light:var(--bg-dark); --surface-light:var(--surface-dark); --text-light:var(--text-dark);
      --border-light:var(--border-dark); --team-select-bg:#1e293b; --team-select-text:#f1f5f9; --team-select-border:#3b82f6;
    }
    body {
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--bg-light); color:var(--text-light);
      height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden;
      font-size:var(--font-base); transition:background 0.2s,color 0.2s;
    }
    body::before { content:''; position:fixed; top:0; left:0; width:100%; height:4px; background:var(--accent-red); z-index:2000; }
    header {
      background:var(--primary-navy); color:#fff; padding:6px 16px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:2px solid var(--primary-gold); flex-shrink:0; flex-wrap:nowrap; gap:8px; min-height:64px;
    }
    .brand-section { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .logo-main { height:42px; width:auto; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3)); background:var(--primary-gold); border-radius:6px; padding:3px; }
    .brand-text h1 { font-size:1.2rem; font-weight:800; letter-spacing:-0.3px; line-height:1.1; white-space:nowrap; }
    .brand-text p { font-size:0.55rem; text-transform:uppercase; letter-spacing:1px; color:var(--primary-gold); line-height:1.1; white-space:nowrap; }
    .timers-area { display:flex; gap:8px; align-items:center; flex-shrink:0; }
    .timer-pill { background:rgba(0,0,0,0.35); border:2px solid var(--accent-red); border-radius:30px; padding:4px 10px; display:flex; align-items:center; gap:6px; font-size:0.75rem; }
    .timer-label { font-weight:600; color:var(--primary-gold); white-space:nowrap; }
    .timer-value { font-family:monospace; font-weight:700; min-width:35px; }
    .timer-value.red-flash { color:red; animation:flash 0.5s infinite; }
    @keyframes flash { 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }
    .btn-icon { background:rgba(255,255,255,0.2); border:none; color:#fff; padding:6px 10px; border-radius:16px; font-size:0.7rem; cursor:pointer; min-height:var(--touch-target); min-width:var(--touch-target); display:inline-flex; align-items:center; justify-content:center; touch-action:manipulation; transition:transform 60ms ease,opacity 60ms ease; }
    .btn-icon:active { opacity:0.7; transform:scale(0.94); }
    .btn-icon.green { background:#2e7d32; }
    .reset-pill { background:var(--accent-red); color:#fff; border:none; padding:8px 14px; border-radius:30px; font-weight:800; font-size:0.7rem; cursor:pointer; white-space:nowrap; min-height:var(--touch-target); touch-action:manipulation; font-family:'Inter',sans-serif; transition:transform 60ms ease,opacity 60ms ease; }
    .reset-pill:active { opacity:0.7; transform:scale(0.94); }
    .tool-section { display:flex; gap:6px; align-items:center; flex-shrink:0; }
    .header-btn { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.3); color:#fff; padding:6px 14px; border-radius:16px; font-size:0.7rem; font-weight:600; cursor:pointer; white-space:nowrap; min-height:var(--touch-target); touch-action:manipulation; font-family:'Inter',sans-serif; transition:transform 60ms ease,opacity 60ms ease; }
    .header-btn:active { opacity:0.7; transform:scale(0.94); }
    .theme-toggle { background:rgba(0,0,0,0.4); border-radius:30px; padding:2px; display:flex; }
    .theme-btn { background:none; border:none; padding:5px 12px; border-radius:24px; cursor:pointer; font-size:0.85rem; color:#fff; min-height:var(--touch-target); min-width:var(--touch-target); touch-action:manipulation; transition:transform 60ms ease,opacity 60ms ease; }
    .theme-btn:active { opacity:0.7; transform:scale(0.94); }
    .theme-btn.active { background:var(--primary-gold); color:#0a1c3a; }
    nav { background:#374151; display:flex; padding:0 10px; gap:2px; flex-shrink:0; overflow-x:auto; }
    .nav-link { padding:8px 14px; background:none; border:none; font-weight:700; font-size:0.75rem; text-transform:uppercase; color:#fff; cursor:pointer; white-space:nowrap; border-bottom:3px solid transparent; min-height:var(--touch-target); touch-action:manipulation; transition:transform 60ms ease,opacity 60ms ease; }
    .nav-link:active { opacity:0.7; transform:scale(0.94); }
    .nav-link.active { color:#fff; border-bottom-color:var(--primary-gold); }
    #main-container { flex:1; overflow:hidden; }
    main { height:100%; padding:10px; overflow-y:auto; overflow-x:hidden; }
    .view-pane { display:none; height:100%; }
    .view-pane.active { display:block; }
    .gameday-container { display:flex; flex-direction:column; height:100%; gap:10px; }
    .card-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; flex:1; min-height:0; }
    .lineup-card { background:var(--surface-light); border-radius:16px; border:1px solid var(--border-light); display:flex; flex-direction:column; overflow:hidden; box-shadow:var(--card-shadow); }
    .card-head { padding:8px 10px; border-bottom:2px solid var(--border-light); display:flex; gap:8px; align-items:center; flex-wrap:nowrap; background:rgba(0,0,0,0.02); }
    .card-head.visitor { border-left:4px solid #3b82f6; }
    .card-head.home { border-left:4px solid var(--accent-red); }
    .team-label { font-size:0.6rem; text-transform:uppercase; font-weight:700; margin-right:-4px; white-space:nowrap; }
    .team-select-wrapper { position:relative; flex:2; }
    .team-select-wrapper::after { content:"▼"; position:absolute; right:8px; top:50%; transform:translateY(-50%); pointer-events:none; font-size:0.6rem; color:var(--team-select-border); }
    .team-select { width:100%; padding:8px; border-radius:10px; font-weight:600; font-size:0.85rem; background:var(--team-select-bg); color:var(--team-select-text); border:2px solid var(--team-select-border); min-height:var(--touch-target); appearance:none; -webkit-appearance:none; }
    .lineup-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .lineup-table { width:100%; border-collapse:collapse; font-size:0.8rem; }
    .lineup-table th { text-align:left; padding:6px 4px; background:rgba(198,28,56,0.85); color:#fff; position:sticky; top:0; z-index:2; font-weight:700; border-bottom:2px solid var(--border-light); backdrop-filter:blur(4px); }
    .lineup-table td { padding:4px 4px; border-bottom:1px solid var(--border-light); vertical-align:middle; color:var(--text-light); }
    body.dark-mode .lineup-table td, body.dark-mode .lineup-table input, body.dark-mode .lineup-table select { color:var(--text-dark); }
    .row-current { background:rgba(230,180,34,0.35)!important; border-left:5px solid var(--primary-gold); }
    .row-current td { font-weight:700; }
    .row-ondeck { background:rgba(100,116,139,0.10); }
    .atbat-btn { background:transparent; border:2px solid #3b82f6; color:#3b82f6; padding:6px 10px; border-radius:24px; font-weight:800; font-size:0.7rem; cursor:pointer; min-width:70px; min-height:var(--touch-target); touch-action:manipulation; transition:transform 60ms ease,opacity 60ms ease; }
    .atbat-btn:hover { background:#3b82f6; color:#fff; }
    .atbat-btn:active { transform:scale(0.94); opacity:0.7; }
    body.dark-mode .atbat-btn { border-color:#60a5fa; color:#60a5fa; }
    .drag-handle { cursor:grab; font-size:1rem; margin-right:3px; user-select:none; }
    select, input { background:var(--surface-light); border:1px solid var(--border-light); padding:6px 5px; border-radius:8px; font-size:0.78rem; width:100%; min-height:var(--touch-target); color:var(--text-light); }
    .combo-wrapper { position:relative; width:100%; }
    .combo-wrapper input { width:100%; padding-right:22px; }
    .combo-wrapper::after { content:"▼"; position:absolute; right:6px; top:50%; transform:translateY(-50%); pointer-events:none; font-size:0.55rem; color:var(--text-light); opacity:0.6; }
    .broadcast-hud { background:#020617; color:#0ef; font-family:'JetBrains Mono',monospace; font-size:0.85rem; font-weight:700; padding:6px 14px; text-align:center; letter-spacing:0.5px; border-top:2px solid var(--primary-gold); flex-shrink:0; }
    .roster-layout { display:grid; grid-template-columns:240px 1fr; gap:10px; height:100%; }
    .team-sidebar { background:var(--surface-light); border-radius:16px; padding:10px; overflow-y:auto; }
    .team-item { padding:8px; border-radius:8px; margin-bottom:4px; cursor:pointer; background:rgba(0,0,0,0.04); font-weight:600; font-size:0.85rem; min-height:var(--touch-target); display:flex; align-items:center; transition:transform 60ms ease,opacity 60ms ease; }
    .team-item:active { opacity:0.7; transform:scale(0.94); }
    .team-item.active { background:var(--primary-gold); color:#0a1c3a; }
    .roster-workspace { background:var(--surface-light); border-radius:16px; padding:10px; overflow-y:auto; }
    .player-row { display:grid; grid-template-columns:50px 1fr 70px 1fr 1fr 34px; gap:5px; margin-bottom:5px; align-items:center; }
    .script-area { width:100%; height:70vh; font-family:monospace; padding:10px; border-radius:12px; border:1px solid var(--border-light); background:var(--surface-light); font-size:0.9rem; }
    .admin-panel { background:var(--surface-light); border-radius:16px; padding:14px; max-width:700px; }
    footer {
      background:var(--primary-navy); padding:6px 14px; padding-bottom:calc(6px + env(safe-area-inset-bottom));
      display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
      font-size:0.7rem; color:#94a3b8; flex-shrink:0; gap:8px;
    }
    .footer-logo { height:30px; width:auto; background:var(--primary-gold); border-radius:5px; padding:2px; }
    .footer-left, .footer-right { display:flex; align-items:center; gap:8px; }
    footer a { color:var(--accent-red); text-decoration:none; font-weight:600; }
    .footer-text { color:var(--accent-red); font-weight:600; }
    .author-name { color:var(--accent-red); font-weight:600; }
    .clock-footer { font-family:'Share Tech Mono',monospace; font-weight:700; padding:3px 8px; letter-spacing:1px; font-size:12px; border-radius:4px; }
    .clock-footer.clock-espn-red{background:#111;color:#fff;border-bottom:2px solid var(--accent-red);}
    .clock-footer.clock-modern-blue{background:#1e3a8a;color:#fff;border-bottom:2px solid var(--primary-gold);}
    .clock-footer.clock-classic{background:#333;color:#0f0;border-bottom:2px solid #0f0;}
    .clock-footer.clock-minimal{background:#f4f4f4;color:#111;border:1px solid #ccc;}
    .clock-footer.clock-neon{background:#000;color:#0ff;border-bottom:2px solid #0ff;text-shadow:0 0 6px #0ff;}
    .clock-footer.clock-bold{background:#fff;color:#000;font-weight:900;border-top:2px solid var(--accent-red);}
    .clock-footer.clock-split{background:#222;color:#fff;border:1px solid #555;font-family:'Courier New',monospace;}
    .clock-footer.clock-led{background:#000;color:#0f0;border:1px solid #333;font-family:'Courier New',monospace;}
    .clock-footer.clock-pill{background:linear-gradient(135deg,#2b2b2b,#444);color:#fff;border-radius:16px;}
    .btn-sm { background:rgba(0,0,0,0.05); border:1px solid var(--border-light); padding:6px 10px; border-radius:20px; cursor:pointer; font-weight:600; font-size:0.75rem; min-height:var(--touch-target); touch-action:manipulation; transition:transform 60ms ease,opacity 60ms ease; }
    .btn-sm:active { opacity:0.7; transform:scale(0.94); }
    .btn-danger { background:var(--accent-red); color:#fff; }
    @media(max-width:900px){ .card-grid{grid-template-columns:1fr;} .roster-layout{grid-template-columns:1fr;} }
    @media print {
      header,nav,.timer-pill,.broadcast-hud,footer,.atbat-btn,.btn-sm,.reset-pill,.header-btn,.theme-toggle,.tool-section,.timers-area{display:none!important;}
      body{background:#fff;color:#000;height:auto;overflow:visible;font-size:12pt;}
      main{overflow:visible;padding:0;}
      .card-grid{grid-template-columns:1fr 1fr;gap:10px;}
      .card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;}
      .card-head{background:#f0f0f0;}
      th{background:#e0e0e0;color:#000;}
      .row-current{background:#fff9c4!important;}
      .drag-handle{display:none;}
      .combo-wrapper::after{display:none;}
    }
    .lineup-table td:first-child{white-space:nowrap;}

    /* ═══ SCOREBUG REDESIGN ═══ */
    .scorebug {
      display:flex; align-items:center; gap:10px;
      background:#001a35; border-radius:8px; padding:6px 16px;
      border-bottom:3px solid var(--accent-red);
      font-family:'Share Tech Mono',monospace; flex-shrink:0; height:48px;
    }
    .scorebug .sb-team { display:flex; flex-direction:column; align-items:center; min-width:44px; }
    .scorebug .sb-abbr { font-size:10px; font-weight:700; text-transform:uppercase; color:var(--primary-gold); letter-spacing:0.5px; }
    .scorebug .sb-runs-row { display:flex; align-items:center; gap:6px; }
    .scorebug .sb-runs { font-size:18px; font-weight:700; color:var(--primary-gold); min-width:28px; text-align:center; }
    .scorebug .sb-inning { display:flex; align-items:center; gap:4px; background:rgba(255,255,255,0.06); border-radius:6px; padding:2px 8px; }
    .scorebug .sb-inning span { font-size:12px; font-weight:700; color:var(--primary-gold); min-width:32px; text-align:center; }
    .scorebug button {
      background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25); color:#fff;
      height:36px; min-width:36px; border-radius:22px; cursor:pointer; font-size:15px; font-weight:600;
      display:inline-flex; align-items:center; justify-content:center;
      touch-action:manipulation; transition:background 80ms ease,transform 80ms ease;
      padding:0 8px;
    }
    .scorebug button:active { background:var(--accent-red); border-color:#fff; transform:scale(0.93); }
  </style>
</head>
<body class="light-mode">

<header>
  <div class="brand-section">
    <img src="_logos/lineup-card-live-logo.png" class="logo-main" id="mainLogo" alt="Lineup Card Live Logo"
         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23e6b422%22/%3E%3Ctext x=%2218%22 y=%2268%22 fill=%22%230a1c3a%22 font-size=%2256%22%3ELC%3C/text%3E%3C/svg%3E'">
    <div class="brand-text">
      <h1 id="brandTitle">LINEUP CARD LIVE</h1>
      <p id="brandSubtext">DIGITAL PRESSBOX</p>
    </div>
  </div>

  <div class="timers-area">
    <div class="timer-pill">
      <span class="timer-label">⚾ 1st</span>
      <span class="timer-value" id="firstPitchDisplay">--:--</span>
      <button type="button" class="btn-icon green" id="markPitchBtn" aria-label="Mark first pitch time now">⏺</button>
      <button type="button" class="btn-icon" id="setCountdownBtn" aria-label="Set countdown timer">⏳</button>
    </div>
    <div class="timer-pill">
      <span class="timer-label">⛈️ WX</span>
      <span class="timer-value" id="wxTimerDisplay">--:--</span>
      <button type="button" class="btn-icon" id="wxStartBtn" aria-label="Start weather delay timer">▶</button>
      <button type="button" class="btn-icon" id="wxResetBtn" aria-label="Reset weather delay timer">◼</button>
    </div>
  </div>

  <!-- Scorebug: pill-shaped buttons, properly contained, gold accents -->
  <div class="scorebug" id="headerScorebug">
    <div class="sb-team">
      <span class="sb-abbr" id="scoreAwayAbbr">AWAY</span>
      <div class="sb-runs-row">
        <button type="button" onclick="window._chRuns('away',-1)" aria-label="Subtract away run">−</button>
        <span class="sb-runs" id="scoreAwayRuns">0</span>
        <button type="button" onclick="window._chRuns('away',1)" aria-label="Add away run">+</button>
      </div>
    </div>
    <div class="sb-inning">
      <button type="button" onclick="window._chInn(-1)" aria-label="Previous inning">◀</button>
      <span id="scoreInning">1</span>
      <button type="button" onclick="window._chInn(1)" aria-label="Next inning">▶</button>
    </div>
    <div class="sb-team">
      <span class="sb-abbr" id="scoreHomeAbbr">HOME</span>
      <div class="sb-runs-row">
        <button type="button" onclick="window._chRuns('home',-1)" aria-label="Subtract home run">−</button>
        <span class="sb-runs" id="scoreHomeRuns">0</span>
        <button type="button" onclick="window._chRuns('home',1)" aria-label="Add home run">+</button>
      </div>
    </div>
  </div>

  <div class="tool-section">
    <button type="button" class="header-btn" onclick="printBothLineups()" aria-label="Print lineup cards">🖨️ PRINT</button>
    <button type="button" class="reset-pill" onclick="confirmResetGame()" aria-label="Reset entire game">↺ RESET</button>
    <div class="theme-toggle">
      <button type="button" class="theme-btn active" id="lightModeBtn" aria-label="Switch to light mode">☀️</button>
      <button type="button" class="theme-btn" id="darkModeBtn" aria-label="Switch to dark mode">🌙</button>
    </div>
  </div>
</header>

<nav aria-label="Main sections">
  <button type="button" class="nav-link active" data-view="gameday" aria-label="Gameday view">📋 GAMEDAY</button>
  <button type="button" class="nav-link" data-view="roster" aria-label="Roster command">📋 ROSTERS</button>
  <button type="button" class="nav-link" data-view="script" aria-label="Script desk">🎙️ SCRIPT</button>
  <button type="button" class="nav-link" data-view="admin" aria-label="Admin suite">⚙️ ADMIN</button>
</nav>

<div id="main-container"><main>
  <div id="gameday" class="view-pane active">
    <div class="gameday-container">
      <div class="card-grid">
        <div class="lineup-card">
          <div class="card-head visitor">
            <span class="team-label">AWAY</span>
            <div class="team-select-wrapper"><select id="visitorTeamSelect" class="team-select" aria-label="Select away team"></select></div>
            <button type="button" class="btn-sm" id="clearVisitorBtn" aria-label="Clear away lineup">CLEAR</button>
          </div>
          <div class="lineup-scroll">
            <table class="lineup-table">
              <thead><tr><th scope="col" style="width:60px">ORDER</th><th scope="col">PLAYER</th><th scope="col" style="width:85px">POS</th><th scope="col" style="width:55px">AB</th></tr></thead>
              <tbody id="visitorLineupBody"></tbody>
            </table>
          </div>
        </div>
        <div class="lineup-card">
          <div class="card-head home">
            <span class="team-label">HOME</span>
            <div class="team-select-wrapper"><select id="homeTeamSelect" class="team-select" aria-label="Select home team"></select></div>
            <button type="button" class="btn-sm" id="clearHomeBtn" aria-label="Clear home lineup">CLEAR</button>
          </div>
          <div class="lineup-scroll">
            <table class="lineup-table">
              <thead><tr><th scope="col" style="width:60px">ORDER</th><th scope="col">PLAYER</th><th scope="col" style="width:85px">POS</th><th scope="col" style="width:55px">AB</th></tr></thead>
              <tbody id="homeLineupBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="roster" class="view-pane">
    <div class="roster-layout">
      <div class="team-sidebar"><h3>🏆 TEAM LIBRARY</h3><div id="teamListContainer"></div><button type="button" class="btn-sm" id="addTeamBtn" style="margin-top:10px;width:100%;" aria-label="Add new team">+ NEW TEAM</button></div>
      <div class="roster-workspace" id="rosterWorkspace"></div>
    </div>
  </div>

  <div id="script" class="view-pane">
    <div style="background:var(--surface-light);border-radius:16px;padding:14px;height:100%;display:flex;flex-direction:column;">
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <button type="button" class="btn-sm" id="printScriptBtn" aria-label="Print script">🖨️</button>
        <button type="button" class="btn-sm" id="loadScriptBtn" aria-label="Load script from file">📂</button>
        <button type="button" class="btn-sm btn-danger" id="clearScriptBtn" aria-label="Clear script">CLEAR</button>
      </div>
      <textarea id="scriptTextarea" class="script-area" placeholder="Announcer notes, pronunciation guide, stats..."></textarea>
      <input type="file" id="scriptFileInput" hidden accept=".txt,.csv">
    </div>
  </div>

  <div id="admin" class="view-pane">
    <div class="admin-panel" id="adminPanel"></div>
  </div>
</main></div>

<div class="broadcast-hud" id="hudDisplay" role="status" aria-live="polite" aria-atomic="true">⚾ AT BAT: -- | ON DECK: --</div>

<footer>
  <div class="footer-left">
    <span>© 2026 <a href="https://voiceofdfw.com" target="_blank" aria-label="Visit Voice of DFW website">Voice of DFW</a> | <span class="author-name">Clayton E. Greenberg</span></span>
  </div>

       onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23e6b422%22/%3E%3Ctext x=%2230%22 y=%2265%22 fill=%22%230a1c3a%22 font-size=%2240%22%3EV%3C/text%3E%3C/svg%3E'">

<script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
<script>
(function(){
var teams={};
var game={visitor:{teamId:"",lineup:[],battingIdx:-1,onDeck:0,runs:0},home:{teamId:"",lineup:[],battingIdx:-1,onDeck:0,runs:0},inning:1};
var wxInterval,wxSeconds=0,pitchCountdownInterval,countdownTarget=null;
var customPositions=["P","C","1B","2B","3B","SS","LF","CF","RF","DH","NA","PR","CR","X"];
var settings=JSON.parse(localStorage.getItem('vdw_settings')||'{}');
if(!Object.keys(settings).length)settings={brand:"LINEUP CARD LIVE",subtext:"DIGITAL PRESSBOX",logo:"_logos/lineup-card-live-logo.png",footerLogo:"_logos/Gold4.png",fontScale:100,awayTeamSelectBg:"#f8f9fb",awayTeamSelectText:"#0f172a",awayTeamSelectBorder:"#1d4ed8",homeTeamSelectBg:"#f8f9fb",homeTeamSelectText:"#0f172a",homeTeamSelectBorder:"#1d4ed8",clockStyle:"espn-red",clockBg:"",clockText:"",clockSize:12,theme:"light",audioVolume:0.5,audioMuted:!1,hudFontSize:"0.85rem",hudTextColor:"#0ef",hudBgColor:"#020617",lastBackup:null};

var audioCtx=null,masterGain=null;
function initAudio(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.connect(audioCtx.destination);}masterGain.gain.value=settings.audioMuted?0:settings.audioVolume;}
function playBeep(f,d,t){t=t||'square';initAudio();var o=audioCtx.createOscillator();o.type=t;o.frequency.value=f;o.connect(masterGain);o.start();o.stop(audioCtx.currentTime+d);}
function playAlarm(){playBeep(1000,0.2);setTimeout(function(){playBeep(800,0.2);},200);setTimeout(function(){playBeep(1000,0.2);},400);}

function createEmptyLineup(){return Array(11).fill().map(function(_,i){return{number:"",name:"",pos:i===9?"DH":i===10?"P":"CF",pronounce:"",notes:""};});}
function saveAll(){try{localStorage.setItem("vdw_teams",JSON.stringify(teams));localStorage.setItem("vdw_game",JSON.stringify(game));localStorage.setItem("vdw_script",document.getElementById("scriptTextarea").value);localStorage.setItem("vdw_settings",JSON.stringify(settings));}catch(e){console.warn('Save failed:',e.message);}}
function loadData(){
  try{var st=localStorage.getItem("vdw_teams");teams=st?JSON.parse(st):{demo:{id:"demo",name:"DFW STARS",players:Array(11).fill().map(function(_,i){return{number:String(i+1),name:"Player "+(i+1),pos:i===9?"DH":i===10?"P":"CF",pronounce:"",notes:""};}),selectBg:"#f8f9fb",selectText:"#0f172a",selectBorder:"#1d4ed8"}};}catch(e){teams={};}
  try{var sg=localStorage.getItem("vdw_game");if(sg)game=JSON.parse(sg);else{game.visitor.lineup=createEmptyLineup();game.home.lineup=createEmptyLineup();}}catch(e){game.visitor.lineup=createEmptyLineup();game.home.lineup=createEmptyLineup();}
  if(!game.visitor.lineup||game.visitor.lineup.length!==11)game.visitor.lineup=createEmptyLineup();
  if(!game.home.lineup||game.home.lineup.length!==11)game.home.lineup=createEmptyLineup();
  game.visitor.runs=game.visitor.runs||0;game.home.runs=game.home.runs||0;game.inning=game.inning||1;
  document.getElementById("scriptTextarea").value=localStorage.getItem("vdw_script")||"";
}
function applySettings(){
  document.documentElement.style.fontSize=(settings.fontScale/100*17)+"px";
  document.getElementById("brandTitle").innerText=settings.brand;document.getElementById("brandSubtext").innerText=settings.subtext;
  document.getElementById("mainLogo").src=settings.logo;document.getElementById("footerLogo").src=settings.footerLogo;
  applyTeamSelectStyle('visitor');applyTeamSelectStyle('home');
  var clk=document.getElementById("footerClock");clk.className='clock-footer clock-'+(settings.clockStyle||'espn-red');
  clk.style.background=settings.clockBg||'';clk.style.color=settings.clockText||'';clk.style.fontSize=(settings.clockSize||12)+'px';
  var hud=document.getElementById("hudDisplay");hud.style.fontSize=settings.hudFontSize;hud.style.color=settings.hudTextColor;hud.style.background=settings.hudBgColor;
  if(settings.theme==='dark'){document.body.classList.add('dark-mode');document.getElementById('lightModeBtn').classList.remove('active');document.getElementById('darkModeBtn').classList.add('active');}
  else{document.body.classList.remove('dark-mode');document.getElementById('lightModeBtn').classList.add('active');document.getElementById('darkModeBtn').classList.remove('active');}
  updateScorebugDisplay();
}
function applyTeamSelectStyle(side){var sel=document.getElementById(side+'TeamSelect');var prefix=side==='visitor'?'away':'home';sel.style.background=settings[prefix+'TeamSelectBg']||'#f8f9fb';sel.style.color=settings[prefix+'TeamSelectText']||'#0f172a';sel.style.borderColor=settings[prefix+'TeamSelectBorder']||'#1d4ed8';}
function updateHUD(){
  var batter=null,onDeck=null;
  if(game.visitor.battingIdx>=0){batter=game.visitor.lineup[game.visitor.battingIdx];onDeck=game.visitor.lineup[game.visitor.onDeck];}
  else if(game.home.battingIdx>=0){batter=game.home.lineup[game.home.battingIdx];onDeck=game.home.lineup[game.home.onDeck];}
  document.getElementById("hudDisplay").innerHTML='⚾ AT BAT: '+(batter?batter.number+' '+batter.name:'--')+' | ON DECK: '+(onDeck?onDeck.number+' '+onDeck.name:'--');
}
function updateScorebugDisplay(){
  var an=teams[game.visitor.teamId]?teams[game.visitor.teamId].name:'AWAY';
  var hn=teams[game.home.teamId]?teams[game.home.teamId].name:'HOME';
  var el=document.getElementById('scoreAwayAbbr');if(el)el.textContent=an.substring(0,6).toUpperCase();
  el=document.getElementById('scoreHomeAbbr');if(el)el.textContent=hn.substring(0,6).toUpperCase();
  el=document.getElementById('scoreAwayRuns');if(el)el.textContent=game.visitor.runs||0;
  el=document.getElementById('scoreHomeRuns');if(el)el.textContent=game.home.runs||0;
  el=document.getElementById('scoreInning');if(el)el.textContent=game.inning<=9?game.inning:'EXTRA';
}
window._chRuns=function(side,d){game[side].runs=Math.max(0,(game[side].runs||0)+d);updateScorebugDisplay();saveAll();};
window._chInn=function(d){game.inning=Math.max(1,Math.min(10,(game.inning||1)+d));updateScorebugDisplay();saveAll();};

function renderTeamDropdowns(){
  var opts='<option value="">-- SELECT TEAM --</option>'+Object.values(teams).map(function(t){return'<option value="'+t.id+'">'+t.name+'</option>';}).join('');
  document.getElementById("visitorTeamSelect").innerHTML=opts;document.getElementById("homeTeamSelect").innerHTML=opts;
  document.getElementById("visitorTeamSelect").value=game.visitor.teamId;document.getElementById("homeTeamSelect").value=game.home.teamId;
}
function renderLineupTable(side){
  var tbody=document.getElementById(side+'LineupBody');if(!tbody)return;
  var lineup=game[side].lineup;var teamId=game[side].teamId;var team=teams[teamId];
  var battingIdx=game[side].battingIdx;var onDeckIdx=game[side].onDeck;
  tbody.innerHTML="";var datalistId='playerList-'+side;
  if(team){var dl=document.createElement("datalist");dl.id=datalistId;dl.innerHTML=team.players.map(function(p){var e='';if(p.pronounce||p.notes)e=' — '+(p.pronounce||'')+(p.notes?' | '+p.notes:'');return'<option value="'+p.number+' '+p.name+'">'+p.number+' '+p.name+e+'</option>';}).join('');tbody.parentElement.appendChild(dl);}
  var posMap={P:1,C:2,"1B":3,"2B":4,"3B":5,SS:6,LF:7,CF:8,RF:9};
  for(var i=0;i<11;i++){var p=lineup[i];var row=tbody.insertRow();row.draggable=true;row.dataset.index=i;
    if(i===battingIdx)row.classList.add("row-current");else if(i===onDeckIdx)row.classList.add("row-ondeck");
    var orderText=i<9?(i+1):(i===9?'DH For':'P');
    row.innerHTML='<td><span class="drag-handle">☰</span> '+orderText+'</td>'+
      '<td><div class="combo-wrapper"><input list="'+datalistId+'" value="'+(p.number+' '+p.name).trim()+'" placeholder="# Name" onchange="updateCombined(\''+side+'\','+i+',this.value)"></div></td>'+
      '<td><select onchange="updateCell(\''+side+'\','+i+',\'pos\',this.value)">'+customPositions.map(function(pos){var num=posMap[pos]||'';var display=pos==='DH'?'DH':(num?pos+'·'+num:pos);return'<option value="'+pos+'"'+(p.pos===pos?' selected':'')+'>'+display+'</option>';}).join('')+'</select></td>'+
      '<td>'+(i<9?'<button type="button" class="atbat-btn" onclick="markAtBat(\''+side+'\','+i+')" aria-label="Mark batter '+(i+1)+' as at bat">AT BAT</button>':'')+'</td>';
  }
  applyTeamSelectStyle(side);updateHUD();updateScorebugDisplay();
}
window.updateCombined=function(side,idx,val){var p=val.trim().split(" ");game[side].lineup[idx].number=p[0]||"";game[side].lineup[idx].name=p.slice(1).join(" ")||"";saveAll();};
window.updateCell=function(side,idx,field,val){game[side].lineup[idx][field]=val;saveAll();};
window.markAtBat=function(side,idx){if(navigator.vibrate)navigator.vibrate(20);playBeep(800,0.1);game[side].battingIdx=idx;game[side].onDeck=(idx+1)%11;var other=side==='visitor'?'home':'visitor';game[other].battingIdx=-1;game[other].onDeck=0;renderLineupTable("visitor");renderLineupTable("home");saveAll();};
window.loadTeamToSide=function(side,teamId){if(!teamId)return;var team=teams[teamId];if(!team)return;if(game[side].lineup.some(function(p){return p.name;})){if(!confirm('Loading a team will replace the current '+side.toUpperCase()+' lineup. Continue?'))return;}game[side].lineup=team.players.slice(0,11).map(function(p){return{number:p.number,name:p.name,pos:p.pos,pronounce:p.pronounce||'',notes:p.notes||''};});game[side].teamId=teamId;renderLineupTable(side);saveAll();};
document.addEventListener('dragstart',function(e){var row=e.target.closest('tr');if(!row)return;e.dataTransfer.setData('text/plain',row.dataset.index);});
document.addEventListener('dragover',function(e){e.preventDefault();});
document.addEventListener('drop',function(e){e.preventDefault();var row=e.target.closest('tr');if(!row)return;var tbody=row.parentElement;var side=tbody.id.startsWith('visitor')?'visitor':'home';var from=parseInt(e.dataTransfer.getData('text/plain'));var to=parseInt(row.dataset.index);if(isNaN(from)||isNaN(to)||from===to)return;var lineup=game[side].lineup;var moved=lineup.splice(from,1)[0];lineup.splice(to,0,moved);renderLineupTable(side);saveAll();});
function markPitch(){var d=new Date();document.getElementById("firstPitchDisplay").innerText=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});document.getElementById("firstPitchDisplay").classList.remove("red-flash");}
function setCountdown(){var input=prompt("Enter countdown (HH:MM):");if(!input)return;var p=input.split(':');var t=new Date();t.setHours(parseInt(p[0]),parseInt(p[1]),0,0);if(t<=new Date())t.setDate(t.getDate()+1);countdownTarget=t;if(pitchCountdownInterval)clearInterval(pitchCountdownInterval);var u=function(){var d=countdownTarget-new Date();var dis=document.getElementById("firstPitchDisplay");if(d<=0){dis.innerText="00:00";dis.classList.add("red-flash");clearInterval(pitchCountdownInterval);playAlarm();}else{var m=Math.floor(d/60000),s=Math.floor((d%60000)/1000);dis.innerText=m+':'+(s<10?'0'+s:s);dis.classList.remove("red-flash");}};u();pitchCountdownInterval=setInterval(u,200);}
function startWx(){if(wxInterval)clearInterval(wxInterval);wxSeconds=1800;var dis=document.getElementById("wxTimerDisplay");dis.classList.remove("red-flash");var u=function(){if(wxSeconds<=0){dis.innerText="00:00";dis.classList.add("red-flash");clearInterval(wxInterval);playAlarm();}else{var m=Math.floor(wxSeconds/60),s=wxSeconds%60;dis.innerText=m+':'+(s<10?'0'+s:s);wxSeconds--;}};u();wxInterval=setInterval(u,1000);}
function resetWx(){if(wxInterval)clearInterval(wxInterval);wxSeconds=0;document.getElementById("wxTimerDisplay").innerText="--:--";document.getElementById("wxTimerDisplay").classList.remove("red-flash");}
window.confirmResetGame=function(){if(confirm("Reset game?")){game.visitor.lineup=createEmptyLineup();game.home.lineup=createEmptyLineup();game.visitor.teamId="";game.home.teamId="";game.visitor.runs=0;game.home.runs=0;game.inning=1;game.visitor.battingIdx=-1;game.home.battingIdx=-1;document.getElementById("firstPitchDisplay").innerText="--:--";resetWx();renderLineupTable("visitor");renderLineupTable("home");renderTeamDropdowns();saveAll();}};
window.printBothLineups=function(){var vT=teams[game.visitor.teamId]?teams[game.visitor.teamId].name:'VISITOR';var hT=teams[game.home.teamId]?teams[game.home.teamId].name:'HOME';var h='<html><head><title>Lineup</title><style>body{font-family:monospace;padding:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #000;padding:5px}</style></head><body><h2>'+vT+'</h2><table><tr><th>Ord</th><th>Player</th><th>Pos</th></tr>';game.visitor.lineup.forEach(function(p,i){h+='<tr><td>'+(i<9?i+1:i===9?'DH':'P')+'</td><td>'+p.number+' '+p.name+'</td><td>'+p.pos+'</td></tr>';});h+='</table><h2>'+hT+'</h2><table><tr><th>Ord</th><th>Player</th><th>Pos</th></tr>';game.home.lineup.forEach(function(p,i){h+='<tr><td>'+(i<9?i+1:i===9?'DH':'P')+'</td><td>'+p.number+' '+p.name+'</td><td>'+p.pos+'</td></tr>';});h+='</table></body></html>';var blob=new Blob([h],{type:'text/html'});var url=URL.createObjectURL(blob);var w=window.open(url);w.onload=function(){w.print();URL.revokeObjectURL(url);};};
window.renderTeamList=function(){document.getElementById("teamListContainer").innerHTML=Object.values(teams).map(function(t){return'<div class="team-item" onclick="editTeam(\''+t.id+'\')">'+t.name+'</div>';}).join('');};
window.editTeam=function(id){var t=teams[id];var ws=document.getElementById("rosterWorkspace");ws.innerHTML='<input id="editTeamName" value="'+t.name+'" style="width:100%;margin-bottom:8px;"><div style="display:grid;grid-template-columns:50px 1fr 70px 1fr 1fr 34px;gap:4px;font-size:0.6rem;font-weight:600;"><span>#</span><span>Name</span><span>Pos</span><span>Pron</span><span>Notes</span><span></span></div><div id="rosterEditGrid"></div><textarea id="parseRosterText" rows="2" placeholder="CSV: number,name,pos,pron,notes" style="width:100%;margin-top:8px;"></textarea><div style="margin:8px 0;"><label>BG:<input type="color" id="teamBgCol" value="'+(t.selectBg||'#f8f9fb')+'"></label><label>Text:<input type="color" id="teamTxtCol" value="'+(t.selectText||'#0f172a')+'"></label><label>Border:<input type="color" id="teamBdrCol" value="'+(t.selectBorder||'#1d4ed8')+'"></label></div><div style="display:flex;gap:6px;"><button type="button" class="btn-sm" id="saveTeamBtn">💾</button><button type="button" class="btn-sm" id="addPlayerRow">➕</button><button type="button" class="btn-sm" id="parseRosterBtn">📝</button><button type="button" class="btn-sm" id="exportTeamCSV">📤</button><input type="file" id="importTeamCSV" hidden accept=".csv"><button type="button" class="btn-sm" onclick="document.getElementById(\'importTeamCSV\').click()">📥</button></div>';var grid=document.getElementById("rosterEditGrid");t.players.forEach(function(p){var d=document.createElement("div");d.className="player-row";d.innerHTML='<input class="pnum" value="'+p.number+'"><input class="pname" value="'+p.name+'"><select class="ppos">'+customPositions.map(function(pos){return'<option value="'+pos+'"'+(p.pos===pos?' selected':'')+'>'+pos+'</option>';}).join('')+'</select><input class="ppron" value="'+(p.pronounce||'')+'"><input class="pnotes" value="'+(p.notes||'')+'"><button type="button" class="delRowBtn" style="background:#c41e3a;color:#fff;border:none;border-radius:4px;" aria-label="Delete player">✖</button>';d.querySelector(".delRowBtn").onclick=function(){d.remove();};grid.appendChild(d);});document.getElementById("saveTeamBtn").onclick=function(){t.name=document.getElementById("editTeamName").value;t.selectBg=document.getElementById("teamBgCol").value;t.selectText=document.getElementById("teamTxtCol").value;t.selectBorder=document.getElementById("teamBdrCol").value;t.players=[].map.call(grid.querySelectorAll(".player-row"),function(r){return{number:r.querySelector(".pnum").value,name:r.querySelector(".pname").value,pos:r.querySelector(".ppos").value,pronounce:r.querySelector(".ppron").value,notes:r.querySelector(".pnotes").value};});saveAll();renderTeamList();renderTeamDropdowns();};document.getElementById("addPlayerRow").onclick=function(){var d=document.createElement("div");d.className="player-row";d.innerHTML='<input class="pnum"><input class="pname"><select class="ppos">'+customPositions.map(function(p){return'<option>'+p+'</option>';}).join('')+'</select><input class="ppron"><input class="pnotes"><button type="button" class="delRowBtn" style="background:#c41e3a;color:#fff;">✖</button>';d.querySelector(".delRowBtn").onclick=function(){d.remove();};grid.appendChild(d);};document.getElementById("parseRosterBtn").onclick=function(){var text=document.getElementById("parseRosterText").value;var lines=text.split(/\r?\n/);var players=lines.filter(function(l){return l;}).map(function(l){var p=l.split(",");return{number:p[0]||"",name:p[1]||"",pos:p[2]||"",pronounce:p[3]||"",notes:p[4]||""};});grid.innerHTML="";players.forEach(function(p){var d=document.createElement("div");d.className="player-row";d.innerHTML='<input class="pnum" value="'+p.number+'"><input class="pname" value="'+p.name+'"><select class="ppos">'+customPositions.map(function(pos){return'<option value="'+pos+'"'+(p.pos===pos?' selected':'')+'>'+pos+'</option>';}).join('')+'</select><input class="ppron" value="'+(p.pronounce||'')+'"><input class="pnotes" value="'+(p.notes||'')+'"><button type="button" class="delRowBtn">✖</button>';d.querySelector(".delRowBtn").onclick=function(){d.remove();};grid.appendChild(d);});};document.getElementById("exportTeamCSV").onclick=function(){var csv=["number,name,pos,pronounce,notes"].concat(t.players.map(function(p){return p.number+','+p.name+','+p.pos+','+p.pronounce+','+p.notes;})).join('\n');var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv]));a.download=t.name+".csv";a.click();};document.getElementById("importTeamCSV").onchange=function(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){var lines=ev.target.result.split(/\r?\n/);var players=lines.filter(function(l){return l;}).map(function(l){var p=l.split(",");return{number:p[0]||"",name:p[1]||"",pos:p[2]||"",pronounce:p[3]||"",notes:p[4]||""};});grid.innerHTML="";players.forEach(function(p){var d=document.createElement("div");d.className="player-row";d.innerHTML='<input class="pnum" value="'+p.number+'"><input class="pname" value="'+p.name+'"><select class="ppos">'+customPositions.map(function(pos){return'<option value="'+pos+'"'+(p.pos===pos?' selected':'')+'>'+pos+'</option>';}).join('')+'</select><input class="ppron" value="'+(p.pronounce||'')+'"><input class="pnotes" value="'+(p.notes||'')+'"><button type="button" class="delRowBtn">✖</button>';d.querySelector(".delRowBtn").onclick=function(){d.remove();};grid.appendChild(d);});};reader.readAsText(file);};};

function renderAdmin(){
  var p=document.getElementById("adminPanel");var lb=settings.lastBackup?new Date(settings.lastBackup).toLocaleString():'Never';

Text:<input type="color" id="clockText" value="'+settings.clockText+'"></label><label>Size:<input type="number" id="clockSize" value="'+settings.clockSize+'"></label><h3>HUD</h3><label>Size:<input id="hudFontSize" value="'+settings.hudFontSize+'"></label><label>Text:<input type="color" id="hudTextColor" value="'+settings.hudTextColor+'"></label><label>BG:<input type="color" id="hudBgColor" value="'+settings.hudBgColor+'"></label><h3>Audio</h3><label>Vol:<input type="range" id="vol" min="0" max="1" step="0.1" value="'+settings.audioVolume+'"></label><label>Mute:<input type="checkbox" id="mute"'+(settings.audioMuted?' checked':'')+'></label><div style="margin:12px 0;background:var(--primary-gold);color:#0a1c3a;padding:6px;border-radius:6px;">Backup: '+lb+' <button type="button" class="btn-sm" id="exportBackupBtn">📦</button></div><button type="button" class="btn-sm" id="importBackupBtn">📂</button><input type="file" id="importBackupFile" hidden><button type="button" class="btn-sm" id="saveAdminBtn">APPLY</button>';
