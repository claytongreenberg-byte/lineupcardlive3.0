<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineup Card Live 3.0</title>
    <style>
        :root {
            --primary: #004d40;
            --accent: #ffc107;
            --bg: #f4f4f9;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }

        .lineup-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .lineup-table th { background: var(--primary); color: white; padding: 12px; text-align: left; }
        .lineup-table td { padding: 12px; border-bottom: 1px solid #ddd; }
        .delete-btn { background: #d32f2f; padding: 5px 10px; font-size: 0.8em; }
        
        .field-view { margin-top: 30px; text-align: center; background: #2e7d32; color: white; padding: 20px; border-radius: 8px; position: relative; height: 300px; }
        .player-badge { background: var(--accent); color: black; padding: 4px 8px; border-radius: 12px; font-weight: bold; position: absolute; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lineup Card Live</h1>
    
    <div class="input-group">
        <input type="text" id="playerName" placeholder="Player Name">
        <select id="playerPosition">
            <option value="P">Pitcher (P)</option>
            <option value="C">Catcher (C)</option>
            <option value="1B">1st Base (1B)</option>
            <option value="2B">2nd Base (2B)</option>
            <option value="3B">3rd Base (3B)</option>
            <option value="SS">Shortstop (SS)</option>
            <option value="LF">Left Field (LF)</option>
            <option value="CF">Center Field (CF)</option>
            <option value="RF">Right Field (RF)</option>
            <option value="DH">Designated Hitter (DH)</option>
        </select>
        <button onclick="addPlayer()">Add to Lineup</button>
    </div>

    <table class="lineup-table">
        <thead>
            <tr>
                <th>Order</th>
                <th>Player</th>
                <th>Position</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="lineupBody">
            </tbody>
    </table>

    <div class="field-view" id="fieldView">
        <p>Field Overview</p>
        </div>
</div>

<script>
    let lineup = [];

    function addPlayer() {
        const name = document.getElementById('playerName').value;
        const pos = document.getElementById('playerPosition').value;

        if (!name) return alert("Please enter a player name.");

        const player = { id: Date.now(), name, pos };
        lineup.push(player);
        
        document.getElementById('playerName').value = '';
        renderLineup();
    }

    function removePlayer(id) {
        lineup = lineup.filter(p => p.id !== id);
        renderLineup();
    }

    function renderLineup() {
        const tbody = document.getElementById('lineupBody');
        const field = document.getElementById('fieldView');
        tbody.innerHTML = '';
        
        // Update Table
        lineup.forEach((player, index) => {
            const row = `<tr>
                <td>${index + 1}</td>
                <td>${player.name}</td>
                <td>${player.pos}</td>
                <td><button class="delete-btn" onclick="removePlayer(${player.id})">Remove</button></td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // Update Field Visualization (Simple logic)
        field.innerHTML = '<p>Field Overview</p>';
        lineup.forEach((player) => {
            const badge = document.createElement('div');
            badge.className = 'player-badge';
            badge.innerText = `${player.pos}: ${player.name}`;
            
            // Simple positioning logic based on position string
            const positions = {
                'P': {top: '180px', left: '45%'},
                'C': {top: '250px', left: '45%'},
                '1B': {top: '150px', left: '70%'},
                '2B': {top: '80px', left: '60%'},
                'SS': {top: '80px', left: '30%'},
                '3B': {top: '150px', left: '20%'},
                'LF': {top: '30px', left: '15%'},
                'CF': {top: '15px', left: '45%'},
                'RF': {top: '30px', left: '75%'},
                'DH': {top: '260px', left: '10%'}
            };

            const coords = positions[player.pos] || {top: '0px', left: '0px'};
            badge.style.top = coords.top;
            badge.style.left = coords.left;
            field.appendChild(badge);
        });
    }
</script>

</body>
</html>
